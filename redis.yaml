name: Redis
shortDescription: Manage Redis data types, vector search, streams, and pub/sub messaging
description: |
  [![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)
  [![Python Version](https://img.shields.io/badge/python-3.13%2B-blue)](https://www.python.org/downloads/)
  A Model Context Protocol (MCP) server that provides a natural language interface designed for agentic applications to efficiently manage and search data in Redis. It integrates seamlessly with MCP clients, enabling AI-driven workflows to interact with structured and unstructured data using conversational commands.
  ## Features
  - **Natural Language Queries**: Enable AI agents to query and update Redis using conversational commands
  - **Complete Redis Data Types**: Support for strings, hashes, lists, sets, sorted sets, streams, and JSON documents
  - **Advanced Search Capabilities**: Vector indexing, search operations, and efficient data retrieval
  - **Real-time Operations**: Pub/sub messaging, stream processing, and event handling
  - **Performance Optimized**: High-performance data operations with scalable architecture
  - **Security Controls**: Redis ACL support for access restriction and user management
  ## What you'll need to connect
  **Required:**
  - **Redis URI**: Connection string for your Redis instance (e.g., `redis://user:pass@localhost:6379/0`)
  **Optional Security:**
  - **Redis ACL**: Configure access controls and user permissions for restricted database access
  ## Example Usage
  - "Store the entire conversation in a stream"
  - "Cache this item with expiration time"
  - "Index and search this vector embedding"
  - "Create a leaderboard with sorted scores"
toolPreview:
- name: set
  description: Set a Redis string value with an optional expiration time
  params:
    key: The key to set
    value: The value to store
    expiration: Optional expiration time in seconds
- name: get
  description: Get a Redis string value
  params:
    key: The key to retrieve
- name: scan_keys
  description: Scan matching keys in batches without blocking the database
  params:
    pattern: Optional key pattern to match
    count: Approximate batch size per scan iteration
    cursor: Cursor from the previous scan call
- name: hset
  description: Set a field in a hash stored at key with an optional expiration time
  params:
    name: The Redis hash key
    key: The field name inside the hash
    value: The value to set (string, int, or float)
    expire_seconds: Optional time in seconds after which the key should expire
- name: set_vector_in_hash
  description: Store an embedding vector in a Redis hash field
  params:
    name: The Redis hash key
    vector: The vector (list of numbers) to store in the hash
    vector_field: The field name inside the hash (default "vector")
- name: lpush
  description: Push a value onto the left of a Redis list with optional expiration
  params:
    name: The Redis list key
    value: Value to push to the list
    expire: Optional expiration time in seconds
- name: sadd
  description: Add a member to a Redis set with an optional expiration
  params:
    name: The Redis set key
    value: The value to add
    expire_seconds: Optional time in seconds after which the set should expire
- name: zadd
  description: Add a member and score to a Redis sorted set
  params:
    key: The sorted set key
    score: Numeric score for the member
    member: The member to add
    expiration: Optional expiration time in seconds
- name: publish
  description: Publish a message to a Redis pub/sub channel
  params:
    channel: The channel to publish to
    message: The message to send
- name: xadd
  description: Add an entry to a Redis stream with optional expiration
  params:
    key: The stream key
    fields: Field-value pairs for the stream entry
    expiration: Optional expiration time in seconds
- name: xreadgroup
  description: Read stream entries using a consumer group
  params:
    key: The stream key
    group_name: The consumer group name
    consumer_name: The consumer name
    count: Maximum number of entries to retrieve
    block_ms: Optional timeout to wait for new entries
    stream_id: Stream ID to read from
- name: json_set
  description: Set a JSON value at a path in a Redis JSON document
  params:
    name: The Redis key holding the JSON document
    path: The JSON path to update
    value: The JSON value to store
    expire_seconds: Optional time in seconds after which the key should expire
- name: create_vector_index_hash
  description: Create a vector similarity index over Redis hashes
  params:
    index_name: Name of the Redis search index
    prefix: Key prefix to index
    vector_field: Hash field containing the vector
    dim: Vector dimensionality
    distance_metric: Distance metric such as COSINE or L2
- name: vector_search_hash
  description: Run a KNN vector search against indexed Redis hashes
  params:
    query_vector: Query embedding as a list of floats
    index_name: Name of the Redis search index
    vector_field: Indexed vector field name
    k: Number of nearest matches to return
    return_fields: Optional fields to include in results
- name: hybrid_search
  description: Combine Redis filters with vector similarity search
  params:
    query_vector: Query embedding as a list of floats
    filter_expression: Redis search filter expression
    index_name: Name of the Redis search index
    vector_field: Indexed vector field name
    k: Number of nearest matches to return
    return_fields: Optional fields to include in results
- name: info
  description: Get Redis server information and statistics by section
  params:
    section: Info section such as default, memory, or cpu
- name: search_redis_documents
  description: Search Redis documentation and best practices with natural language
  params:
    question: The Redis question or topic to look up

metadata:
  categories: Databases
icon: https://avatars.githubusercontent.com/u/1529926?s=48&v=4
repoURL: https://github.com/redis/mcp-redis
env:
- key: REDIS_URI
  name: Redis URI
  required: true
  sensitive: false
  description: URL for connecting to the Redis instance (e.g. redis://user:pass@localhost:6379/0).

runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/redis:0.5.0
  port: 8099
  path: /
  args:
  - redis-mcp-server
  - --url
  - ${REDIS_URI}
