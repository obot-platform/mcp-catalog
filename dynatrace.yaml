name: Dynatrace
shortDescription: Query logs, metrics, spans, and manage problems with Dynatrace observability
description: |2

  A Model Context Protocol (MCP) server for Dynatrace integration, providing comprehensive observability and monitoring capabilities through Dynatrace API.

  ## Features
  - **Access Dynatrace observability data from compatible AI applications**
  - **Query logs, metrics, spans, and events using natural language**
  - **Manage problems, vulnerabilities, and entities through Dynatrace APIs**
  - **Generate reports and insights based on Dynatrace monitoring data**
  - **Analyze performance data and get AI-powered troubleshooting suggestions**

  ## What you will need to connect

  **Required Credentials**:
  - `DT_PLATFORM_TOKEN`: Your Dynatrace Platform Token. To create one, refer to the [Dynatrace documentation](https://www.dynatrace.com/support/help/shortlink/platform-tokens) for more details.
  - `DT_ENVIRONMENT`: Your Dynatrace environment URL (e.g., https://abc12345.apps.dynatrace.com)


metadata:
  categories: Monitoring, Developer Tools, DevOps
  allow-multiple: "true"
icon: https://avatars.githubusercontent.com/u/58178984?s=48&v=4
repoURL: https://github.com/dynatrace-oss/dynatrace-mcp
env:
- key: DT_PLATFORM_TOKEN
  name: Dynatrace Platform Token
  required: true
  sensitive: true
  description: Your Dynatrace Platform Token.
- key: DT_ENVIRONMENT
  name: Dynatrace Environment
  required: true
  sensitive: false
  description: Your Dynatrace environment URL
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/dynatrace:1.7.6
  port: 8099
  path: /
  args:
  - mcp-server-dynatrace
toolPreview:
- name: get_environment_info
  description: Verify the Dynatrace connection and return environment details.
  params: {}

# Observability & Security
- name: list_vulnerabilities
  description: List active vulnerabilities, with optional timeframe and DQL filters.
  params:
    timeframe: "Timeframe to query, e.g. '30d' or '7d'"
    riskScore: "Minimum risk score to include (default: 8.0)"
    additionalFilter: "Optional DQL filter, e.g. 'dt.entity.service == \"SERVICE-123\"' or 'vulnerability.risk.level == \"CRITICAL\"'"
    maxVulnerabilitiesToDisplay: "Maximum results to return (default: 25)"

- name: list_problems
  description: List recent Dynatrace problems, optionally filtered by status and DQL.
  params:
    timeframe: "Timeframe to query, e.g. '24h' or '7d'"
    status: "Problem status filter: ACTIVE, CLOSED, or ALL"
    additionalFilter: "Optional DQL filter, e.g. 'dt.entity.service == \"SERVICE-123\"'"
    maxProblemsToDisplay: "Maximum results to return (default: 10)"

- name: list_exceptions
  description: List recent exceptions captured in Dynatrace user events.
  params:
    timeframe: "Timeframe to query, e.g. '24h' or '30m'"
    additionalFilter: "Optional DQL filter, e.g. 'error.id == \"...\"' or 'dt.rum.application.entity == \"APPLICATION-123\"'"
    maxExceptionsToDisplay: "Maximum results to return (default: 10)"

# Entity Discovery
- name: find_entity_by_name
  description: Find Dynatrace entities by name before querying logs, metrics, or events.
  params:
    entityNames: "Array of entity names or identifiers to search for"
    maxEntitiesToDisplay: "Maximum matches to return (default: 10)"
    extendedSearch: "Set to true to search more entity types"

# Data Querying
- name: execute_dql
  description: Run a DQL query against Grail for logs, metrics, spans, events, or entities.
  params:
    dqlStatement: "DQL query to execute"
    recordLimit: "Maximum number of records to return (default: 100)"
    recordSizeLimitMB: "Maximum response size in MB (default: 1)"

- name: verify_dql
  description: Check a DQL statement for syntax issues before execution.
  params:
    dqlStatement: "The DQL statement to verify"

- name: generate_dql_from_natural_language
  description: Turn a natural language request into a Dynatrace DQL query.
  params:
    text: "Natural language description of the data you want to query"

- name: explain_dql_in_natural_language
  description: Explain what a Dynatrace DQL statement does in plain language.
  params:
    dql: "The DQL statement to explain"

# AI Assistance
- name: chat_with_davis_copilot
  description: Ask a general Dynatrace question when a more specific tool is not a better fit.
  params:
    text: "Your question or request for Davis CoPilot"
    context: "Optional context to provide additional information"
    instruction: "Optional instruction for how to format the response"

- name: list_davis_analyzers
  description: List available Davis Analyzers such as forecasting and anomaly detection analyzers.
  params: {}

- name: execute_davis_analyzer
  description: Run a Davis Analyzer with custom input parameters and time bounds.
  params:
    analyzerName: "Analyzer name, e.g. 'dt.statistics.GenericForecastAnalyzer'"
    input: "JSON object with analyzer input parameters"
    timeframeStart: "Analysis start time (default: 'now-1h')"
    timeframeEnd: "Analysis end time (default: 'now')"

# Kubernetes Integration
- name: get_kubernetes_events
  description: Retrieve Kubernetes events for a cluster, entity, timeframe, or event type.
  params:
    timeframe: "Timeframe to query, e.g. '24h' or '7d'"
    clusterId: "Kubernetes cluster UID (k8s.cluster.uid)"
    kubernetesEntityId: "Dynatrace Kubernetes entity ID, e.g. 'KUBERNETES_CLUSTER-123'"
    eventType: "Optional event type filter, e.g. 'ERROR_EVENT'"

# Communication & Automation
- name: send_slack_message
  description: Send a Slack message through a Dynatrace Slack connector.
  params:
    channel: "The Slack channel to send the message to"
    message: "The message content to send"

- name: send_email
  description: Send an email through the Dynatrace Email API.
  params:
    toRecipients: "Array of email addresses for TO recipients"
    ccRecipients: "Array of email addresses for CC recipients"
    bccRecipients: "Array of email addresses for BCC recipients"
    subject: "Subject line of the email"
    body: "Plain-text email body"

- name: send_event
  description: Ingest a custom Dynatrace event for alerts, deployments, or annotations.
  params:
    eventType: "Event type, e.g. 'CUSTOM_INFO' or 'CUSTOM_DEPLOYMENT'"
    title: "Short event title"
    entitySelector: "Optional Dynatrace entity selector"
    properties: "Optional key-value properties object"
    startTime: "Optional start timestamp in UTC milliseconds"
    endTime: "Optional end timestamp in UTC milliseconds"

- name: create_workflow_for_notification
  description: Create a Dynatrace workflow that notifies a team about matching problems.
  params:
    problemType: "Problem type to notify on"
    teamName: "Team name for the workflow"
    channel: "Notification channel, such as a Slack channel"
    isPrivate: "Set to true to create the workflow as private"

- name: make_workflow_public
  description: Make an existing Dynatrace workflow publicly accessible.
  params:
    workflowId: "The workflow ID to make public"

# Share Results
- name: create_dynatrace_notebook
  description: Create a Dynatrace notebook with markdown and DQL content.
  params:
    name: "Notebook name"
    description: "Optional notebook description"
    content: "Array of notebook blocks, e.g. [{type: 'markdown', text: 'Summary'}, {type: 'dql', text: 'fetch logs | limit 10'}]"

# Budget Management
- name: reset_grail_budget
  description: Reset the tracked Grail query budget for the current session.
  params: {}
