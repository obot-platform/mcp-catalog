- name: list_variable_sets
  description: List variable sets in an organization.
  params:
    page: "Optional. Page number for pagination"
    pageSize: "Optional. Results per page for pagination"
    query: "Optional. Filter query for variable set names"
    terraform_org_name: "Terraform organization name"
- name: list_workspace_policy_sets
  description: List policy sets attached to a workspace.
  params:
    terraform_org_name: "Terraform organization name"
    workspace_id: "Workspace ID"
- name: list_workspace_variables
  description: List variables in a workspace.
