    queue_all_runs: "Optional. Whether to queue all runs"
    speculative_enabled: "Optional. Whether speculative plans are enabled"
    tags: "Optional. Comma-separated tags to replace existing tags"
    terraform_org_name: "Terraform organization name"
    terraform_version: "Optional. New Terraform version"
