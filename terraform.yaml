    hcl: "Optional. Whether the value is HCL"
    key: "Variable key"
    sensitive: "Optional. Whether the variable is sensitive"
    terraform_org_name: "Terraform organization name"
    value: "Variable value"
    variable_id: "Variable ID"
    workspace_name: "Workspace name"

env:
- name: Terraform Cloud/Enterprise Token
  key: TFE_TOKEN
  description: Your Terraform Cloud or Enterprise API token for authentication. Generate from User Settings > Tokens in Terraform Cloud.
  required: true
  sensitive: true
- name: Terraform Address
  key: TFE_ADDRESS
  description: HCP Terraform or Terraform Enterprise address. Defaults to https://app.terraform.io
  required: false
  sensitive: false

runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/terraform:0.5.1
  port: 8080
  path: "/mcp"
  args:
  - /bin/terraform-mcp-server
  - http
  - --transport-port
  - 8080
  - --transport-host
  - 0.0.0.0
