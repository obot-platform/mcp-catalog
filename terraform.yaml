    hcl: "Optional. Whether the value is HCL"
    key: "Variable key"
    sensitive: "Optional. Whether the variable is sensitive"
    terraform_org_name: "Terraform organization name"
    value: "Variable value"
    workspace_name: "Workspace name"
- name: delete_variable_in_variable_set
