name: Todoist
shortDescription: Manage Todoist tasks, projects, and team collaboration through natural language
description: |

  A Model Context Protocol (MCP) server for Todoist integration, providing comprehensive task and project management capabilities through Todoist's API.

  ## Features
  - **Access Todoist data from compatible AI applications**
  - **Create and manage tasks, projects, and sections through natural language**
  - **Track activity and completed tasks with detailed history**
  - **Manage team collaboration and task assignments**
  - **Search across tasks and projects efficiently**

  ## What you'll need to connect

  **No Setup Required**: Authentication is handled automatically through Todoist's OAuth2 workflow

metadata:
  categories: Business, Productivity
  allow-multiple: "true"
icon: https://img.icons8.com/?size=100&id=MFaX6nJlDgiU&format=png&color=000000
repoURL: https://github.com/Doist/todoist-ai
runtime: remote
remoteConfig:
  fixedURL: https://ai.todoist.net/mcp
toolPreview:
  # User & Workspace Information
  - name: user-info
    description: Get comprehensive user information including user ID, full name, email, timezone with current local time, week start day preferences, current week dates, daily and weekly goal progress, and user plan.
    params: {}
  - name: get-productivity-stats
    description: Get productivity stats including completion breakdowns, streaks, karma, and goal progress.
    params: {}
  - name: list-workspaces
    description: List all workspaces available to the authenticated user with plan and role details.
    params: {}

  # Overview & Navigation
  - name: get-overview
    description: Get a Markdown overview of all projects, or a detailed overview of one project with tasks grouped by section.
    params:
      projectId: "Optional project ID. If provided, shows detailed overview of that project. If omitted, shows overview of all projects."
  - name: fetch-object
    description: Fetch a single task, project, comment, or section by ID when you already know the exact object.
    params:
      type: "Object type to fetch: task, project, comment, or section"
      id: "ID of the object to fetch"

  # Project Management
  - name: add-projects
    description: Add one or more new personal or workspace projects.
    params:
      projects: "Array of projects to add, each with name and optional parentId, isFavorite, viewStyle, color, and workspace (workspace name or ID)"
  - name: update-projects
    description: Update multiple existing projects with new values.
    params:
      projects: "Array of projects to update, each requiring id and optional fields: name, isFavorite, viewStyle, color"
  - name: find-projects
    description: List all projects or search projects by name.
    params:
      searchText: "Optional project name search (partial, case-insensitive, wildcard-friendly)"
      limit: "Maximum number of projects to return (1-100, default: 50)"
      cursor: "Cursor for pagination to get the next page of projects"
  - name: project-management
    description: Archive or unarchive a project by ID.
    params:
      action: "Project action: archive or unarchive"
      projectId: "ID of the project"
  - name: project-move
    description: Move a project between personal and workspace contexts.
    params:
      action: "Move action: move-to-workspace or move-to-personal"
      projectId: "ID of the project to move"
      workspaceId: "Target workspace ID when moving to a workspace"
      folderId: "Optional target folder ID within the workspace"
      visibility: "Optional workspace visibility: restricted, team, or public"
  - name: get-project-health
    description: Get project progress, health status, and optional detailed context with task-level recommendations.
    params:
      projectId: "ID of the project to assess"
      includeContext: "Set true to include detailed project metrics and task data"
  - name: get-project-activity-stats
    description: Get daily and optional weekly task completion counts for a project.
    params:
      projectId: "ID of the project"
      weeks: "Optional number of weeks of history to include (1-12, default: 2)"
      includeWeeklyCounts: "Set true to include weekly rollups"
  - name: analyze-project-health
    description: Trigger a fresh project health analysis when health data is stale.
    params:
      projectId: "ID of the project to analyze"
  - name: get-workspace-insights
    description: Get cross-project health and progress insights for a workspace.
    params:
      workspaceIdOrName: "Workspace ID or name"
      projectIds: "Optional array of project IDs to limit the insight scope"

  # Section Management
  - name: add-sections
    description: Add one or more new sections to projects. Essential for organizing tasks within projects.
    params:
      sections: "Array of sections to add, each with name (required) and projectId (required)"
  - name: update-sections
    description: Update multiple existing sections with new values. Modify section names.
    params:
      sections: "Array of sections to update, each requiring id and name"
  - name: find-sections
    description: Search sections within a project, or list all sections in that project.
    params:
      projectId: "The ID of the project to search sections in (required)"
      searchText: "Optional section name search (partial, case-insensitive, wildcard-friendly)"
  - name: reorder-objects
    description: Reorder sibling projects or sections, and optionally move projects under a new parent.
    params:
      type: "Entity type to reorder: project or section"
      items: "Array of reorder operations with id and order, plus optional parentId for project moves"

  # Task Management - Creation & Updates
  - name: add-tasks
    description: Add one or more tasks to inbox, projects, sections, or parent tasks, with optional assignment.
    params:
      tasks: "Array of tasks to add, each with content and optional description, priority, dueString, deadlineDate, duration, labels, projectId, sectionId, parentId, order, responsibleUser, and isUncompletable"
  - name: update-tasks
    description: Update existing tasks including content, dates, labels, moves, priorities, and assignments.
    params:
      tasks: "Array of tasks to update, each requiring id and optional fields: content, description, projectId, sectionId, parentId, order, priority, dueString, deadlineDate, duration, responsibleUser, labels, and isUncompletable"
  - name: reschedule-tasks
    description: Move tasks to new dates while preserving recurring schedules and existing times when possible.
    params:
      tasks: "Array of reschedules, each with task id and new date (YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS)"
  - name: complete-tasks
    description: Complete one or more tasks by their IDs. Mark tasks as done.
    params:
      ids: "Array of task IDs to complete (required)"
  - name: uncomplete-tasks
    description: Reopen one or more completed tasks by ID.
    params:
      ids: "Array of task IDs to reopen"

  # Task Management - Search & Discovery
  - name: find-tasks
    description: Find tasks by text, container, assignee, labels, a raw filter string, or a saved Todoist filter.
    params:
      searchText: "The text to search for in tasks"
      projectId: "Find tasks in this project"
      sectionId: "Find tasks in this section"
      parentId: "Find subtasks of this parent task"
      responsibleUser: "Find tasks assigned to this user (can be user ID, name, or email)"
      responsibleUserFiltering: "How to filter by responsible user: 'assigned' (only tasks assigned to others), 'unassignedOrMe' (default: unassigned or assigned to me), 'all' (all tasks)"
      filter: "Optional raw Todoist filter query string"
      filterIdOrName: "Optional saved filter ID or name to resolve and use"
      labels: "Array of labels to filter tasks by"
      labelsOperator: "Operator for label filtering: 'and' (task has all labels) or 'or' (default: task has any label)"
      limit: "Maximum number of tasks to return (1-100, default: 10)"
      cursor: "Pagination cursor for retrieving more results"
  - name: find-tasks-by-date
    description: Get tasks by date range, including today's tasks and optional overdue handling.
    params:
      startDate: "The start date to get tasks for (YYYY-MM-DD format or 'today')"
      daysCount: "Number of days to get tasks for, starting from start date (1-30, default: 1)"
      overdueOption: "How to handle overdue tasks: 'overdue-only', 'include-overdue' (default), or 'exclude-overdue'"
      responsibleUser: "Find tasks assigned to this user (can be user ID, name, or email)"
      responsibleUserFiltering: "How to filter by responsible user: 'assigned', 'unassignedOrMe' (default), or 'all'"
      labels: "Array of labels to filter tasks by"
      labelsOperator: "Operator for label filtering: 'and' or 'or' (default)"
      limit: "Maximum number of tasks to return (1-100, default: 10)"
      cursor: "Pagination cursor for retrieving more results"
  - name: find-completed-tasks
    description: Get completed tasks by completion date or due date, with an automatic 7-day default window.
    params:
      getBy: "Method to use: 'completion' (default: when task was completed) or 'due' (when task was due)"
      since: "Optional start date (YYYY-MM-DD). Defaults to a 7-day window when omitted"
      until: "Optional end date (YYYY-MM-DD). Defaults to a 7-day window when omitted"
      projectId: "The ID of the project to get tasks for"
      sectionId: "The ID of the section to get tasks for"
      parentId: "The ID of the parent task to get tasks for"
      responsibleUser: "Find tasks assigned to this user (defaults to all collaborators when omitted)"
      labels: "Array of labels to filter tasks by"
      labelsOperator: "Operator for label filtering: 'and' or 'or' (default)"
      workspaceId: "The ID of the workspace to get tasks for"
      limit: "Maximum number of tasks to return (1-200, default: 50)"
      cursor: "Pagination cursor for retrieving more results"

  # Labels & Filters
  - name: add-labels
    description: Add one or more new personal labels.
    params:
      labels: "Array of labels to add, each with name and optional color, order, and isFavorite"
  - name: find-labels
    description: List personal labels and shared labels, with optional personal-label search.
    params:
      searchText: "Optional label name search (partial, case-insensitive, wildcard-friendly)"
      limit: "Maximum number of personal labels to return when not searching"
      cursor: "Cursor for paginated personal label results when not searching"
  - name: find-filters
    description: List all personal filters or search for them by name.
    params:
      search: "Optional filter name search (partial and case-insensitive)"
  - name: add-filters
    description: Add one or more new personal filters using Todoist query syntax.
    params:
      filters: "Array of filters to add, each with name, query, optional color, and optional isFavorite"
  - name: update-filters
    description: Update one or more existing personal filters.
    params:
      filters: "Array of filters to update, each requiring id and optional name, query, color, and isFavorite"

  # Comments, Reminders & Attachments
  - name: add-comments
    description: Add multiple comments to tasks or projects. Each comment must specify either taskId or projectId. Use for discussion and feedback.
    params:
      comments: "Array of comments to add, each with content (required) and either taskId or projectId"
  - name: find-comments
    description: Find comments by task, project, or get a specific comment by ID. Exactly one of taskId, projectId, or commentId must be provided.
    params:
      taskId: "Find comments for a specific task"
      projectId: "Find comments for a specific project"
      commentId: "Get a specific comment by ID"
      limit: "Maximum number of comments to return (1-10)"
      cursor: "Pagination cursor for retrieving more results"
  - name: update-comments
    description: Update multiple existing comments with new content. Modify comment text.
    params:
      comments: "Array of comments to update, each requiring id and content"
  - name: add-reminders
    description: Add relative, absolute, or location-based reminders to tasks.
    params:
      reminders: "Array of reminders to create, each with type and taskId plus type-specific fields such as minuteOffset, due, or location details"
  - name: find-reminders
    description: Find reminders for a task, or fetch a specific reminder by ID.
    params:
      taskId: "Task ID to list all reminders for"
      reminderId: "ID of a time-based reminder to fetch"
      locationReminderId: "ID of a location reminder to fetch"
  - name: update-reminders
    description: Update existing relative, absolute, or location reminders.
    params:
      reminders: "Array of reminder updates, each with type, id, and only the fields that should change"
  - name: view-attachment
    description: View a Todoist comment attachment from its file URL, returning image, text, or embedded binary content.
    params:
      fileUrl: "Attachment URL from a comment's fileAttachment.fileUrl field"

  # Activity & History
  - name: find-activity
    description: Retrieve recent activity logs to monitor and audit changes in Todoist. Shows events from all users by default (use initiatorId to filter by specific user). Track task completions, updates, deletions, project changes, and more with flexible filtering.
    params:
      eventType: "Type of event to filter by: 'added', 'updated', 'deleted', 'completed', 'uncompleted', 'archived', 'unarchived', 'shared', 'left'"
      objectType: "Type of object to filter by: 'task', 'project', 'comment'"
      objectId: "Filter by specific object ID (task, project, or comment)"
      projectId: "Filter events by parent project ID"
      taskId: "Filter events by parent task ID (for subtask events)"
      initiatorId: "Filter by the user ID who initiated the event"
      limit: "Maximum number of activity events to return (1-100, default: 20)"
      cursor: "Pagination cursor for retrieving the next page of results"

  # Team & Collaboration Management
  - name: find-project-collaborators
    description: Find Todoist users by name or email across a project, or across all accessible shared projects when projectId is omitted.
    params:
      projectId: "Optional project ID to scope the search to one project"
      searchTerm: "Optional collaborator name or email search (partial and case-insensitive)"
  - name: manage-assignments
    description: Bulk assignment operations for multiple tasks. Supports assign, unassign, and reassign operations with atomic rollback on failures.
    params:
      operation: "The assignment operation to perform: 'assign', 'unassign', 'reassign' (required)"
      taskIds: "Array of task IDs to operate on (max 50, required)"
      responsibleUser: "The user to assign tasks to (user ID, name, or email). Required for 'assign' and 'reassign' operations."
      fromAssigneeUser: "For 'reassign' operations: the current assignee to reassign from (user ID, name, or email). Optional if reassigning from any current assignee."
      dryRun: "If true, validates operations without executing them (default: false)"

  # Deletion
  - name: delete-object
    description: Delete a Todoist object by ID, including tasks, projects, comments, labels, filters, and reminders.
    params:
      type: "The type of entity to delete: project, section, task, comment, label, filter, reminder, or location_reminder"
      id: "The ID of the entity to delete (required)"

  # OpenAI MCP Compatibility - Search & Fetch
  - name: search
    description: Search across Todoist tasks and projects and return result IDs, titles, and URLs. OpenAI MCP compatible.
    params:
      query: "The search query string to find tasks and projects (required)"
  - name: fetch
    description: Fetch the full contents of a task or project by its composite OpenAI MCP ID. OpenAI MCP compatible.
    params:
      id: "A unique identifier for the document in the format 'task:{id}' or 'project:{id}' (required)"
