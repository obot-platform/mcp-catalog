name: Tableau
shortDescription: Query Tableau data sources, access Pulse metrics, and explore workbooks
description: |
  A Model Context Protocol (MCP) server that provides comprehensive access to Tableau Cloud and Tableau Server through multiple APIs. Connect to published data sources, query data with VizQL, explore Pulse metrics, and access workbooks and views with full metadata support.

  ## Features
  - **VizQL Data Service (VDS) API**: Access to Tableau published data sources with advanced querying capabilities
  - **Tableau Metadata API**: Collect data source metadata including columns with rich descriptions
  - **Pulse API Integration**: Access Pulse Metrics, Definitions, Subscriptions, and generate Insight Bundles
  - **Cross-Platform Support**: Compatible with any published data source on Tableau Cloud or Tableau Server

  ## What you'll need to connect

  **Required:**
  - **Tableau Server URL**: the URL of the Tableau Server instance
  - **Personal Access Token Name**: the name of the Personal Access Token
  - **Personal Access Token Value**: the value of the Personal Access Token

  **Optional:**
  - **Tableau Site Name**: the name of the Tableau site to use. If not provided, the default site will be used.

metadata:
  categories: Data Analytics, Business Intelligence, Visualization
icon: https://avatars.githubusercontent.com/u/828667?s=48&v=4
repoURL: https://github.com/tableau/tableau-mcp

toolPreview:
  - name: list-datasources
    description: Lists published Tableau data sources, with optional filtering and pagination controls.
    params:
      filter: "Optional Tableau REST API filter expression, e.g. name:eq:Project Views"
      pageSize: "Optional page size for paginated datasource retrieval"
      limit: "Optional maximum number of data sources to return"
  - name: get-datasource-metadata
    description: Returns datasource field and parameter metadata for a published Tableau data source.
    params:
      datasourceLuid: "The LUID of the data source to inspect"
  - name: query-datasource
    description: Runs a VizQL query against a published Tableau data source and returns the result rows.
    params:
      datasourceLuid: "The LUID of the data source to query"
      query: "VizQL query object describing fields, filters, sorting, and grouping"
      limit: "Optional maximum number of result rows to return"
  - name: list-workbooks
    description: Lists Tableau workbooks, with optional filtering and pagination controls.
    params:
      filter: "Optional Tableau REST API filter expression, e.g. name:eq:Superstore"
      pageSize: "Optional page size for paginated workbook retrieval"
      limit: "Optional maximum number of workbooks to return"
  - name: get-workbook
    description: Returns workbook details, including contained views and their usage statistics.
    params:
      workbookId: "The ID of the workbook to retrieve"
  - name: list-views
    description: Lists Tableau views, with optional filtering and pagination controls.
    params:
      filter: "Optional Tableau REST API filter expression, e.g. name:eq:Overview"
      pageSize: "Optional page size for paginated view retrieval"
      limit: "Optional maximum number of views to return"
  - name: list-custom-views
    description: Lists custom views for a workbook, with optional filtering and pagination controls.
    params:
      workbookId: "The workbook ID whose custom views should be listed"
      filter: "Optional custom-view filter, e.g. viewId:eq:<viewId> or ownerId:eq:<ownerId>"
      pageSize: "Optional page size for paginated custom view retrieval"
      limit: "Optional maximum number of custom views to return"
  - name: get-view-data
    description: Returns CSV data for a Tableau view.
    params:
      viewId: "The ID of the view to read"
      viewFilters: "Optional map of view filter field names to values"
  - name: get-view-image
    description: Returns a rendered image for a Tableau view.
    params:
      viewId: "The ID of the view to render"
      width: "Optional image width in pixels"
      height: "Optional image height in pixels"
      format: "Optional image format: PNG or SVG"
      viewFilters: "Optional map of view filter field names to values"
  - name: get-custom-view-data
    description: Returns CSV data for a Tableau custom view.
    params:
      customViewId: "The ID of the custom view to read"
      viewFilters: "Optional map of view filter field names to values"
  - name: list-all-pulse-metric-definitions
    description: Lists all published Tableau Pulse metric definitions.
    params:
      view: "Optional definition view: DEFINITION_VIEW_BASIC, DEFINITION_VIEW_FULL, or DEFINITION_VIEW_DEFAULT"
      limit: "Optional maximum number of metric definitions to return"
      pageSize: "Optional page size for paginated definition retrieval"
  - name: list-pulse-metric-definitions-from-definition-ids
    description: Returns specific Pulse metric definitions for a list of definition IDs.
    params:
      metricDefinitionIds: "Array of Pulse metric definition IDs to retrieve"
      view: "Optional definition view: DEFINITION_VIEW_BASIC, DEFINITION_VIEW_FULL, or DEFINITION_VIEW_DEFAULT"
  - name: list-pulse-metrics-from-metric-definition-id
    description: Lists published Pulse metrics for a specific Pulse metric definition.
    params:
      pulseMetricDefinitionID: "The Pulse metric definition ID to list metrics for"
  - name: list-pulse-metrics-from-metric-ids
    description: Returns published Pulse metrics for a list of metric IDs.
    params:
      metricIds: "Array of Pulse Metric IDs to list metrics for"
  - name: list-pulse-metric-subscriptions
    description: Lists Pulse metric subscriptions for the current user.
    params: {}
  - name: generate-pulse-metric-value-insight-bundle
    description: Generates a Pulse insight bundle for the current value of a metric.
    params:
      bundleRequest: "Pulse insight bundle request object with metric metadata, definition, and options"
      bundleType: "Optional bundle type: ban, basic, springboard, or detail"
  - name: generate-pulse-insight-brief
    description: Generates conversational AI insights for Pulse metrics from a natural-language request.
    params:
      briefRequest: "Insight brief request object with messages, locale, language, and metric context"
  - name: search-content
    description: Searches Tableau site content across supported object types.
    params:
      terms: "Optional search text; omit to search broadly within the provided filters"
      limit: "Optional maximum number of search results to return"
      orderBy: "Optional array of sort methods and directions"
      filter: "Optional content, owner, or modified-time filter object"

env:
  - name: Tableau Server URL
    key: SERVER
    description: Your Tableau Cloud or Server URL (e.g., https://your-site.online.tableau.com)
    required: true
    sensitive: false
  - name: Tableau Site Name
    key: SITE_NAME
    description: The name of the Tableau site to use. If not provided, the default site will be used.
    required: false
    sensitive: false
  - name: Personal Access Token Name
    key: PAT_NAME
    description: The name of your Personal Access Token
    required: true
    sensitive: false
  - name: Personal Access Token Value
    key: PAT_VALUE
    description: The secret value of your Personal Access Token
    required: true
    sensitive: true

runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/tableau:main
  port: 8098
  path: "/tableau-mcp"
