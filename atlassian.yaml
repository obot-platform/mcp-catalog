name: Atlassian
shortDescription: Manage Jira issues, Confluence pages, and Compass services with AI assistance
description: |

  A Model Context Protocol (MCP) server that bridges between your Atlassian Cloud site and compatible external tools. Once configured, it enables those tools to interact with Jira, Compass, and Confluence data in real-time.

  ## Features
  - **Smart Jira Management**: Create, update, search, and transition issues with AI assistance, manage comments, and track project metadata
  - **Intelligent Confluence Operations**: Search content using CQL, create and update pages, manage comments (both footer and inline), and navigate page hierarchies
  - **Compass Integration**: Query service dependencies and manage your service landscape
  - **Rovo Search & Fetch**: Powerful unified search across Jira and Confluence, fetch resources by ARI (Atlassian Resource Identifier)
  - **Advanced Filtering**: Use JQL for Jira issues and CQL for Confluence content with AI-powered natural language queries
  - **Zero Configuration**: OAuth flow handles authentication automatically - no API tokens or local setup needed
  - **Enterprise Ready**: Respects existing user permissions and access controls across all Atlassian products

  ## What you'll need to connect

  **No Setup Required**: Authentication is handled automatically through OAuth2 workflow.

  **Important for Admins**: To enable OAuth with Obot, your Atlassian admin must add the Obot callback URL domain:
  1. Go to [Atlassian Administration](https://admin.atlassian.com) and select your organization
  2. Navigate to **Apps > AI settings > Rovo MCP server**
  3. Add your Obot domain (e.g., `https://your-obot-domain/**`)

  ## Example Usage

  Ask your AI assistant to:

  - **Jira Management** - "Update Jira ticket PROJ-123 status to In Progress" or "Create a bug ticket from these error logs"
  - **Confluence Search** - "Find our OKR guide in Confluence and summarize it" or "Search for authentication documentation"
  - **Content Creation** - "Create a tech design doc for XYZ feature in the Engineering space"
  - **Issue Filtering** - "Show me all urgent bugs assigned to me from last week"
  - **Cross-Product Linking** - "Link Jira ticket ABC-456 to the Q4 Planning Confluence page"
  - **Compass Integration** - "What services depend on the api-gateway component?"

toolPreview:
  # Shared Atlassian
  - name: atlassianUserInfo
    description: Get the current Atlassian user and account ID.
    params: {}
  - name: getAccessibleAtlassianResources
    description: List Atlassian cloud sites (`cloudId`) the user can access.
    params: {}

  # Rovo Search
  - name: search
    description: Search Jira and Confluence with natural-language Rovo Search.
    params:
      query: Search query
  - name: fetch
    description: Fetch Jira or Confluence content by ARI.
    params:
      id: Atlassian Resource Identifier (ARI)

  # Jira
  - name: getJiraIssue
    description: Get a Jira issue by ID or key.
    params:
      cloudId: Atlassian Cloud site identifier
      issueIdOrKey: Jira issue ID or key
  - name: searchJiraIssuesUsingJql
    description: Search Jira issues with JQL.
    params:
      cloudId: Atlassian Cloud site identifier
      jql: Jira Query Language expression
  - name: createJiraIssue
    description: Create a Jira issue in a project and issue type.
    params:
      cloudId: Atlassian Cloud site identifier
      projectKey: Project key
      issueTypeName: Issue type name
      summary: Issue summary
  - name: editJiraIssue
    description: Update fields on an existing Jira issue.
    params:
      cloudId: Atlassian Cloud site identifier
      issueIdOrKey: Jira issue ID or key
      fields: Fields to update
  - name: addCommentToJiraIssue
    description: Add a comment to a Jira issue.
    params:
      cloudId: Atlassian Cloud site identifier
      issueIdOrKey: Jira issue ID or key
      commentBody: Comment body in Markdown
  - name: addWorklogToJiraIssue
    description: Add a time-tracking worklog to a Jira issue.
    params: {}
  - name: getTransitionsForJiraIssue
    description: List available workflow transitions for a Jira issue.
    params:
      cloudId: Atlassian Cloud site identifier
      issueIdOrKey: Jira issue ID or key
  - name: transitionJiraIssue
    description: Transition a Jira issue to a new workflow state.
    params:
      cloudId: Atlassian Cloud site identifier
      issueIdOrKey: Jira issue ID or key
      transition: Transition object with the target ID
  - name: getJiraIssueRemoteIssueLinks
    description: List remote links on a Jira issue.
    params:
      cloudId: Atlassian Cloud site identifier
      issueIdOrKey: Jira issue ID or key
  - name: getVisibleJiraProjects
    description: List Jira projects the user can view, browse, edit, or create in.
    params:
      cloudId: Atlassian Cloud site identifier
  - name: getJiraProjectIssueTypesMetadata
    description: List issue types available in a Jira project.
    params:
      cloudId: Atlassian Cloud site identifier
      projectIdOrKey: Project ID or key
  - name: getJiraIssueTypeMetaWithFields
    description: Get create-field metadata for a Jira project and issue type.
    params:
      cloudId: Atlassian Cloud site identifier
      projectIdOrKey: Project ID or key
      issueTypeId: Issue type ID
  - name: lookupJiraAccountId
    description: Find Jira user account IDs by name or email.
    params:
      cloudId: Atlassian Cloud site identifier
      searchString: User name or email

  # Confluence
  - name: getConfluenceSpaces
    description: List Confluence spaces.
    params:
      cloudId: Atlassian Cloud site identifier
  - name: getConfluencePage
    description: Get a Confluence page or live doc with Markdown body.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
  - name: getPagesInConfluenceSpace
    description: List pages in a Confluence space.
    params:
      cloudId: Atlassian Cloud site identifier
      spaceId: Confluence space ID
  - name: getConfluencePageDescendants
    description: List descendant pages under a parent page.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
  - name: searchConfluenceUsingCql
    description: Search Confluence content with CQL.
    params:
      cloudId: Atlassian Cloud site identifier
      cql: Confluence Query Language expression
  - name: createConfluencePage
    description: Create a Confluence page or live doc from Markdown.
    params:
      cloudId: Atlassian Cloud site identifier
      spaceId: Confluence space ID
      title: Page title
      body: Page body in Markdown
  - name: updateConfluencePage
    description: Update an existing Confluence page or live doc.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
      body: Updated body in Markdown
  - name: getConfluencePageFooterComments
    description: List footer comments on a Confluence page.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
  - name: getConfluencePageInlineComments
    description: List inline comments on a Confluence page.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
  - name: createConfluenceFooterComment
    description: Create a footer comment or reply on a page.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
      body: Comment body in Markdown
  - name: createConfluenceInlineComment
    description: Create an inline comment or reply tied to selected text.
    params:
      cloudId: Atlassian Cloud site identifier
      pageId: Confluence page ID
      body: Comment body in Markdown

  # Jira Service Management
  - name: getJsmOpsAlerts
    description: Get an ops alert by ID or alias, or search alerts by query and time window.
    params: {}
  - name: getJsmOpsScheduleInfo
    description: List on-call schedules or get current and next responders.
    params: {}
  - name: getJsmOpsTeamInfo
    description: List ops teams and fetch team details.
    params: {}
  - name: updateJsmOpsAlert
    description: Acknowledge, unacknowledge, close, or escalate an ops alert.
    params: {}

  # Bitbucket Cloud
  - name: bitbucketWorkspace
    description: List Bitbucket workspaces or get one workspace.
    params: {}
  - name: bitbucketRepository
    description: List repositories in a workspace or get one repository.
    params: {}
  - name: bitbucketRepoContent
    description: Work with repository branches, commits, and file contents.
    params: {}
  - name: bitbucketPullRequest
    description: Create, inspect, comment on, diff, approve, or merge pull requests.
    params: {}
  - name: bitbucketPipeline
    description: List, inspect, or run pipelines and fetch step logs.
    params: {}
  - name: bitbucketEnvironment
    description: List, get, create, update, or delete deployment environments.
    params: {}
  - name: bitbucketDeployment
    description: List deployments or get a specific deployment.
    params: {}

  # Teamwork Graph
  - name: getTeamworkGraphContext
    description: Fetch linked Jira, Confluence, user, and third-party context.
    params: {}
  - name: getTeamworkGraphObject
    description: Fetch full Teamwork Graph data for one or more ARIs or URLs.
    params: {}

  # Compass
  - name: getCompassComponents
    description: Search or list Compass components.
    params: {}
  - name: getCompassComponent
    description: Get details for a Compass component by ID.
    params: {}
  - name: getCompassComponentsOwnedByMyTeams
    description: List Compass components owned by the user's teams.
    params: {}
  - name: getCompassComponentTypes
    description: List available Compass component types.
    params: {}
  - name: getCompassComponentLabels
    description: Get labels applied to a Compass component.
    params: {}
  - name: getCompassComponentActivityEvents
    description: List recent activity events for a Compass component.
    params: {}
  - name: getCompassCustomFieldDefinitions
    description: List Compass custom field definitions.
    params: {}
  - name: createCompassComponent
    description: Create a Compass component such as a service or library.
    params: {}
  - name: createCompassComponentRelationship
    description: Create a relationship between Compass components.
    params: {}
  - name: createCompassCustomFieldDefinition
    description: Create a Compass custom field definition.
    params: {}
  - name: deleteCompassComponent
    description: Delete a Compass component.
    params: {}
  - name: deleteCompassComponentRelationship
    description: Delete a relationship between Compass components.
    params: {}
  - name: deleteCompassCustomFieldDefinition
    description: Delete a Compass custom field definition.
    params: {}

