name: Neon Database
shortDescription: Manage Neon Postgres databases with natural language, branching, and migrations
description: |
  <picture>
    <source media="(prefers-color-scheme: dark)" srcset="https://neon.com/brand/neon-logo-dark-color.svg">
    <source media="(prefers-color-scheme: light)" srcset="https://neon.com/brand/neon-logo-light-color.svg">
    <img width="250px" alt="Neon Logo fallback" src="https://neon.com/brand/neon-logo-dark-color.svg">
  </picture>

  [![npm version](https://img.shields.io/npm/v/@neondatabase/mcp-server-neon)](https://www.npmjs.com/package/@neondatabase/mcp-server-neon)
  [![npm downloads](https://img.shields.io/npm/dt/@neondatabase/mcp-server-neon)](https://www.npmjs.com/package/@neondatabase/mcp-server-neon)
  [![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)

  A Model Context Protocol (MCP) server that lets you interact with your Neon Postgres databases using natural language. Built on the Model Context Protocol, it acts as a bridge between natural language requests and the Neon API, enabling seamless database management without complex SQL or direct API calls.

  ## Features
  - **Natural Language Interaction**: Manage Neon databases using intuitive, conversational commands
  - **Project & Branch Management**: Create, delete, and manage Neon projects and branches with branching capabilities
  - **SQL Query Execution**: Run single queries or transactions with performance analysis and optimization
  - **Database Migrations**: Safe schema changes with temporary branch testing and rollback capabilities
  - **Performance Optimization**: Query tuning, execution plans, and slow query identification
  - **Accessibility**: Empowers users with varying technical backgrounds to interact with databases

  ## What you'll need to connect

  **Required:**
  - **Neon Account**: Active Neon account (sign up at [console.neon.tech](https://console.neon.tech/signup))

  ## Example Usage

  - "Let's create a new Postgres database, and call it 'my-database'. Let's then create a table called users with columns: id, name, email, and password."
  - "I want to run a migration on my project 'my-project' that alters the users table to add a 'created_at' column."
  - "Can you give me a summary of all of my Neon projects and what data is in each one?"

metadata:
  categories: Databases
icon: https://avatars.githubusercontent.com/u/183852044?v=4
repoURL: https://github.com/neondatabase/mcp-server-neon
runtime: remote
remoteConfig:
  fixedURL: https://mcp.neon.tech/mcp

toolPreview:
  - name: list_projects
    description: List Neon projects in your account, with optional search and pagination.
    params:
      cursor: Optional cursor for pagination
      limit: Maximum number of projects to return
      org_id: Optional organization ID to filter projects
      search: Optional project name or ID filter
  - name: list_organizations
    description: List organizations you can access.
    params:
      search: Optional organization name or ID filter
  - name: list_shared_projects
    description: List projects shared with the current user.
    params:
      cursor: Optional cursor for pagination
      limit: Maximum number of shared projects to return
      search: Optional project name or ID filter
  - name: create_project
    description: Create a new Neon project.
    params:
      name: Optional project name
      org_id: Optional organization ID
  - name: delete_project
    description: Delete a Neon project
    params:
      projectId: ID of the project to delete
  - name: describe_project
    description: Describes a Neon project
    params:
      projectId: ID of the project to describe
  - name: run_sql
    description: Execute a single SQL statement against a Neon database.
    params:
      projectId: Project ID
      branchId: Optional branch ID to execute SQL on
      databaseName: Optional database name
      sql: SQL statement to execute
  - name: run_sql_transaction
    description: Execute multiple SQL statements in a single transaction.
    params:
      projectId: Project ID
      branchId: Optional branch ID to execute transaction on
      databaseName: Optional database name
      sqlStatements: Array of SQL statements to execute in transaction
  - name: describe_table_schema
    description: Describe the schema of a table in a Neon database
    params:
      tableName: Name of the table to describe
      projectId: Project ID
      branchId: Optional branch ID
      databaseName: Optional database name
  - name: get_database_tables
    description: Get all tables in a Neon database
    params:
      projectId: Project ID
      branchId: Optional branch ID
      databaseName: Optional database name
  - name: create_branch
    description: Create a branch in a Neon project
    params:
      projectId: Project ID
      branchName: Optional branch name
  - name: prepare_database_migration
    description: Prepare a schema migration on a temporary branch for review.
    params:
      migrationSql: SQL to execute for the migration
      projectId: Project ID
      databaseName: Optional database name
  - name: complete_database_migration
    description: Apply or discard a prepared migration and clean up the temporary branch.
    params:
      migrationId: Migration ID from prepare_database_migration
      migrationSql: Exact migration SQL from prepare_database_migration
      databaseName: Database name from prepare_database_migration
      projectId: Project ID from prepare_database_migration
      temporaryBranchId: Temporary branch ID to clean up
      parentBranchId: Parent branch ID to apply the migration to
      applyChanges: Whether to apply the migration or just clean up
  - name: describe_branch
    description: Get a tree view of all objects in a branch, including databases, schemas, tables, views, and functions
    params:
      projectId: Project ID
      branchId: Branch ID to describe
      databaseName: Optional database name
  - name: delete_branch
    description: Delete a branch from a Neon project
    params:
      projectId: Project ID
      branchId: Branch ID to delete
  - name: reset_from_parent
    description: Reset a branch to match its parent, with optional preservation.
    params:
      projectId: Project ID containing the branch
      branchIdOrName: Branch name or ID to reset
      preserveUnderName: Optional backup branch name before reset
  - name: get_connection_string
    description: Get a PostgreSQL connection string for a Neon database.
    params:
      projectId: Project ID
      branchId: Optional branch ID or name
      computeId: Optional compute ID
      databaseName: Optional database name
      roleName: Optional role name
  - name: provision_neon_auth
    description: Provision Neon Auth for a project branch.
    params:
      projectId: Project ID to provision authentication for
      branchId: Optional branch ID
      databaseName: Optional database name
  - name: provision_neon_data_api
    description: Provision the Neon Data API for HTTP access to a project branch.
    params:
      projectId: Project ID to provision the Data API for
      branchId: Optional branch ID
      databaseName: Optional database name
      authProvider: Optional auth provider (neon_auth, external, or none)
      jwksUrl: Optional JWKS URL for external auth
      providerName: Optional external auth provider name
      jwtAudience: Optional expected JWT audience
      provisionNeonAuthFirst: Optionally provision Neon Auth first
  - name: explain_sql_statement
    description: Explain a SQL statement with PostgreSQL execution plan details.
    params:
      sql: SQL statement to explain
      projectId: Project ID
      branchId: Optional branch ID
      databaseName: Optional database name
      analyze: Whether to include ANALYZE
  - name: prepare_query_tuning
    description: Prepare query tuning recommendations on a temporary branch.
    params:
      sql: SQL query to optimize
      databaseName: Database name
      projectId: Project ID
      roleName: Optional role name for connection
  - name: complete_query_tuning
    description: Apply or discard query tuning changes and clean up the temporary branch.
    params:
      suggestedSqlStatements: Suggested SQL statements to apply
      applyChanges: Whether to apply the suggested changes
      tuningId: Tuning ID from prepare_query_tuning
      databaseName: Name of the database
      projectId: Project ID
      roleName: Optional role name for connection
      shouldDeleteTemporaryBranch: Whether to delete the temporary branch
      temporaryBranchId: Temporary branch ID from prepare_query_tuning
      branchId: Optional target branch ID or name
  - name: list_slow_queries
    description: List slow queries from a Neon database.
    params:
      projectId: Project ID
      branchId: Optional branch ID
      databaseName: Optional database name
      computeId: Optional compute ID
      limit: Maximum number of queries to return
      minExecutionTime: Minimum execution time threshold in milliseconds
  - name: list_branch_computes
    description: List compute endpoints for a project or branch.
    params:
      projectId: Optional project ID
      branchId: Optional branch ID
  - name: compare_database_schema
    description: Compare a branch schema with its parent.
    params:
      projectId: Project ID
      branchId: Branch ID to compare
      databaseName: Database name
  - name: search
    description: Search organizations, projects, and branches.
    params:
      query: Search query
  - name: fetch
    description: Fetch details for a Neon resource returned by search.
    params:
      id: Resource ID from search results
  - name: list_docs_resources
    description: List available Neon documentation pages.
    params: {}
  - name: get_doc_resource
    description: Fetch a specific Neon documentation page as markdown.
    params:
      slug: Documentation slug from list_docs_resources
