name: Playwright
shortDescription: Browser automation with accessibility-based interactions using Playwright
description: 'A Model Context Protocol (MCP) server that provides browser automation capabilities using Playwright. This server enables AI agents to interact with web pages through structured accessibility snapshots, bypassing the need for screenshots or visually-tuned models for fast, deterministic automation.


  ## Features

  - **Accessibility-Based Automation**: Uses Playwright''s accessibility tree instead of pixel-based input for reliable automation

  - **LLM-Friendly Interface**: Operates purely on structured data without requiring vision models

  - **Core Web Interactions**: Click, type, navigate, drag, hover, and form interactions with precise element targeting

  - **Advanced Capabilities**: JavaScript evaluation, file uploads, dialog handling, and network monitoring

  - **Tab Management**: Multi-tab browser control with opening, closing, and switching between tabs

  - **Screenshot & PDF Generation**: Visual capture and document generation capabilities (with optional capabilities)

  - **Coordinate-Based Actions**: Precise mouse control with optional vision capabilities for complex interactions


  ## What you''ll need to connect


  **No Setup Required**: Playwright works out-of-the-box with no API keys or configuration needed.

  '
metadata:
  categories: Automation & Browsers
  unsupportedTools: browser_snapshot,browser_take_screenshot,browser_screen_capture,browser_pdf_save,browser_install
icon: https://avatars.githubusercontent.com/u/6154722?v=4
repoURL: https://github.com/microsoft/playwright-mcp
env: []
toolPreview:
- name: browser_close
  description: Close the current page (Read-only - false)
- name: browser_resize
  description: Resize the browser window (Read-only - false)
  params:
    width: Width of the browser window
    height: Height of the browser window
- name: browser_console_messages
  description: Return console messages from the page (Read-only - true)
  params:
    level: Minimum console level to include
    all: Include messages from the full session
    filename: Save the messages to a file
- name: browser_handle_dialog
  description: Accept or dismiss an open browser dialog (Read-only - false)
  params:
    accept: Whether to accept the dialog
    promptText: Text to enter for a prompt dialog
- name: browser_evaluate
  description: Run JavaScript on the page or an element (Read-only - false)
  params:
    function: JavaScript function to execute
    element: Human-readable element description
    ref: Exact target element reference from the page snapshot
    filename: Save the result to a file
- name: browser_file_upload
  description: Upload one or more files (Read-only - false)
  params:
    paths: Absolute paths of files to upload
- name: browser_fill_form
  description: Fill multiple form fields in one call (Read-only - false)
  params:
    fields: Array of field definitions to fill
- name: browser_press_key
  description: Press a keyboard key (Read-only - false)
  params:
    key: Key name or character to press
- name: browser_type
  description: Type text into an editable element (Read-only - false)
  params:
    element: Human-readable element description used to obtain permission to interact with the element
    ref: Exact target element reference from the page snapshot
    text: Text to type into the element
    submit: Whether to submit entered text after typing
    slowly: Whether to type one character at a time
- name: browser_navigate
  description: Navigate to a URL (Read-only - false)
  params:
    url: The URL to navigate to
- name: browser_navigate_back
  description: Go back to the previous page (Read-only - false)
- name: browser_network_requests
  description: Return network requests since the current page loaded (Read-only - true)
  params:
    static: Include successful static resources
    requestBody: Include request bodies
    requestHeaders: Include request headers
    filter: Regex used to filter request URLs
    filename: Save the requests to a file
- name: browser_run_code
  description: Run a Playwright code snippet against the page (Read-only - false)
  params:
    code: JavaScript function containing Playwright code
    filename: Load the code from a file
- name: browser_take_screenshot
  description: Take a screenshot of the page or an element (Read-only - true)
  params:
    element: Human-readable element description for an element screenshot
    ref: Exact target element reference from the page snapshot
    type: Image format to save
    filename: File name to save the screenshot to
    fullPage: Capture the full scrollable page
- name: browser_snapshot
  description: Capture an accessibility snapshot of the page (Read-only - true)
  params:
    depth: Limit the snapshot tree depth
    filename: Save the snapshot to a file
- name: browser_click
  description: Click an element on the page (Read-only - false)
  params:
    element: Human-readable element description used to obtain permission to interact with the element
    ref: Exact target element reference from the page snapshot
    doubleClick: Whether to perform a double click
    button: Mouse button to click
    modifiers: Modifier keys to hold while clicking
- name: browser_drag
  description: Drag from one element to another (Read-only - false)
  params:
    startElement: Human-readable source element description
    startRef: Exact source element reference from the page snapshot
    endElement: Human-readable target element description
    endRef: Exact target element reference from the page snapshot
- name: browser_hover
  description: Hover over an element on the page (Read-only - false)
  params:
    element: Human-readable element description used to obtain permission to interact with the element
    ref: Exact target element reference from the page snapshot
- name: browser_select_option
  description: Select one or more options in a dropdown (Read-only - false)
  params:
    element: Human-readable element description used to obtain permission to interact with the element
    ref: Exact target element reference from the page snapshot
    values: Array of option values to select
- name: browser_tabs
  description: List, create, close, or select browser tabs (Read-only - false)
  params:
    action: Tab action to perform
    index: Tab index for close or select
- name: browser_wait_for
  description: Wait for text to appear, disappear, or for time to pass (Read-only - true)
  params:
    time: Time to wait in seconds
    text: Text to wait for
    textGone: Text to wait for to disappear
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/playwright:0.0.70
  port: 8099
  path: /
  args:
  - mcp-server-playwright
