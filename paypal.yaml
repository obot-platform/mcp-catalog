name: PayPal
shortDescription: Create invoices, process payments, manage subscriptions, and handle disputes with PayPal
description: |
  A Model Context Protocol (MCP) server for PayPal that enables AI agents to create invoices and manage business transactions through natural language interactions.

  ## Features
  - **Invoice Management**: Create, send, and manage PayPal invoices with QR code generation
  - **Payment Processing**: Create orders, process refunds, and capture payments
  - **Product Catalog**: Manage PayPal product catalog with detailed product information
  - **Subscription Management**: Create and manage subscription plans and recurring billing
  - **Dispute Resolution**: Handle and resolve PayPal disputes efficiently
  - **Transaction Reporting**: View and filter transaction history with advanced insights
  - **Shipment Tracking**: Add and manage tracking information for orders
  - **Commerce Tools**: Search and purchase gift cards through integrated shopping cart

  ## What you'll need to connect

  **No Setup Required**: Authentication is handled automatically through OAuth2 workflow.

  ## Examples

  - "Create an invoice for john@company.com for 5 hours of consulting at $150/hour, then send it immediately"
  - "Create a monthly subscription plan for my SaaS product at $29.99/month with a 7-day free trial, then set up a subscription for customer@email.com"
  - "Process a partial refund of $50 for capture payment ID ABC123 due to damaged goods"
  - "List all open disputes from the last month and accept the claim for dispute ID DISP456"
  - "Add FedEx tracking number 1234567890 to PayPal transaction TXN789 and update the shipment status to delivered"
  - "Find gift cards under $100, add a $50 Amazon gift card to my cart, and complete checkout using PayPal"


  

metadata:
  categories: Business
icon: https://www.paypal.com/favicon.ico
repoURL: https://www.paypal.ai/docs/tools/mcp-quickstart
runtime: remote
remoteConfig:
  fixedURL: https://mcp.paypal.com/mcp
toolPreview:
  - name: create_invoice
    description: Create a draft invoice in PayPal
    params:
      detail: Invoice metadata including currency and invoice date
      primary_recipients: Recipient billing info and email addresses
      items: Line items to bill on the invoice
  - name: list_invoices
    description: List invoices with pagination options
    params:
      page: Page number for pagination (optional)
      page_size: Number of invoices per page (optional)
      total_required: Include total count in the response (optional)
  - name: send_invoice
    description: Send an invoice to its recipients
    params:
      invoice_id: The PayPal invoice ID to send
  - name: cancel_sent_invoice
    description: Cancel a sent invoice in PayPal
    params:
      invoice_id: The PayPal invoice ID to cancel
  - name: generate_invoice_qr_code
    description: Generate a QR code for an invoice
    params:
      invoice_id: The PayPal invoice ID
  - name: create_order
    description: Create a PayPal order for checkout
    params:
      currencyCode: Currency code for the order
      items: Order line items including cost and quantity
  - name: pay_order
    description: Capture payment for an approved order
    params:
      id: The PayPal order ID to capture
  - name: create_refund
    description: Refund a captured payment
    params:
      capture_id: The captured payment ID to refund
      amount: Optional object with `currency_code` and `value`
  - name: create_product
    description: Create a product in the PayPal catalog
    params:
      name: Product name
      type: Product type such as PHYSICAL, DIGITAL, or SERVICE
  - name: list_products
    description: List products in the PayPal catalog
    params:
      page: Page number to retrieve (optional)
      page_size: Maximum number of products to return (optional)
      total_required: Include total count in the response (optional)
  - name: create_subscription_plan
    description: Create a subscription plan for a product
    params:
      product_id: Product ID for the plan
      name: Plan name
      billing_cycles: Trial and regular billing cycle definitions
      payment_preferences: Billing and failure handling preferences
  - name: create_subscription
    description: Create a subscription from a plan
    params:
      plan_id: Subscription plan ID
      quantity: Quantity for the subscription (optional)
      subscriber: Subscriber details (optional)
  - name: cancel_subscription
    description: Cancel an active subscription
    params:
      subscription_id: Subscription ID to cancel
      payload: Cancellation payload with an optional reason
  - name: list_disputes
    description: List disputes with pagination and state filters
    params:
      dispute_state: Filter by dispute lifecycle state (optional)
      page: Page number to retrieve (optional)
      page_size: Number of disputes per page (optional)
  - name: accept_dispute_claim
    description: Accept a dispute claim in the buyer's favor
    params:
      dispute_id: The PayPal dispute ID
      note: Seller note explaining the acceptance
  - name: list_transactions
    description: List transactions with date and pagination filters
    params:
      start_date: Start of the reporting window in ISO 8601 (optional)
      end_date: End of the reporting window in ISO 8601 (optional)
      transaction_id: Specific transaction ID to look up (optional)
  - name: create_shipment_tracking
    description: Add shipment tracking to a PayPal transaction
    params:
      tracking_number: Carrier tracking number
      transaction_id: Captured transaction ID for the shipment
      carrier: Shipping carrier name
      order_id: PayPal order ID for the shipment (optional)
      status: Shipment status such as SHIPPED or DELIVERED (optional)
  - name: get_merchant_insights
    description: Retrieve merchant sales or order insights
    params:
      start_date: Start date for the insight range
      end_date: End date for the insight range
      insight_type: Insight type such as ORDERS or SALES
      time_interval: Aggregation interval such as DAILY or MONTHLY
