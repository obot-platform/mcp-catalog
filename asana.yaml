name: Asana
shortDescription: Manage Asana tasks and projects with natural language through AI integration
description: |

  A Model Context Protocol (MCP) server for Asana integration, providing comprehensive project management capabilities through Asana's API.

  ## Features
  - **Access Asana data from compatible AI applications**
  - **Create and manage tasks and projects through natural language**
  - **Generate reports and summaries based on Asana data**
  - **Analyze project data and get AI-powered suggestions**

  ## What you'll need to connect

  **No Setup Required**: Authentication is handled automatically through Asana's OAuth2 workflow

  ## Examples
  - "Find all my incomplete tasks due this week"
  - "Create a new task in the Marketing project assigned to me"
  - "List all sections in the Product Launch project"
  - "Show me the status of the Q2 Planning project"

metadata:
  categories: Business, Developer Tools
  allow-multiple: "true"
icon: https://avatars.githubusercontent.com/u/1472111?s=200&v=4
repoURL: https://developers.asana.com/docs/using-asanas-mcp-server
runtime: remote
remoteConfig:
  fixedURL: https://mcp.asana.com/sse
toolPreview:
  - name: search_objects
    description: Search Asana objects in the authorized workspace, including projects, portfolios, users, and goals.
  - name: search_tasks
    description: Search tasks with natural filters such as text, assignee, status, and due dates.
  - name: get_status_overview
    description: Return a compact status summary for project or portfolio work.
  - name: get_task
    description: Fetch full details for a specific task.
  - name: get_tasks
    description: List tasks in the current workspace using common filters.
  - name: create_task
    description: Create a new task in Asana.
  - name: update_task
    description: Update task fields such as title, notes, assignee, completion, and dates.
  - name: create_project
    description: Create a new project.
  - name: get_project
    description: Fetch details for a specific project.
  - name: get_projects
    description: List projects available in the authorized workspace.
  - name: get_portfolio
    description: Fetch details for a specific portfolio.
  - name: get_portfolios
    description: List portfolios in the authorized workspace.
  - name: get_items_for_portfolio
    description: List the projects and other items contained in a portfolio.
  - name: get_user
    description: Fetch profile details for the current user or another accessible user.
  - name: get_workspace_users
    description: List users in the authorized workspace.
