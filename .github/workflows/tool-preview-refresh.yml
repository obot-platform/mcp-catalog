name: Tool Preview Refresh

on:
  schedule:
    # GitHub Actions cron uses UTC.
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tool-preview-refresh
  cancel-in-progress: false

jobs:
  refresh-tool-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install mcptools
        run: |
          go install github.com/f/mcptools/cmd/mcptools@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Run OpenCode refresh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          PROMPT=$(cat <<'EOF'
          Refresh catalog tool previews across this repository.

          Work only on root-level `*.yaml` catalog files.

          For every YAML file:
          1. If the file does not contain `toolPreview`, skip it without changes.
          2. Inspect the MCP server however necessary to determine whether `toolPreview` is stale.
          3. If the existing `toolPreview` is already accurate enough, leave the file unchanged.
          4. If the `toolPreview` is stale, update only the `toolPreview` block.

          Inspection rules:
          - `mcptools` is installed in the runner and available on PATH. Use it when it is a good fit for inspecting MCP servers.
          - Prefer live MCP introspection (`tools/list`, negotiated protocol version, remote endpoint, published container image, or runnable server command) when feasible.
          - If live introspection is blocked by auth, transport limitations, or unavailable infrastructure, fall back to upstream source code, official docs, README tables, published package metadata, or other authoritative repo-linked sources.
          - Use the best available source per server and avoid guessing.

          Editing rules:
          - Make the smallest correct changes.
          - Do not edit YAML files that do not have `toolPreview`.
          - Do not change unrelated fields outside `toolPreview` unless absolutely required for preview accuracy.
          - Preserve the repo's existing YAML style as much as possible.
          - Keep tool descriptions concise and practical.
          - Prefer current tool names over deprecated placeholder names.

          Repository-level goal:
          - Scan all root-level YAML catalog files in one pass.
          - If no `toolPreview` updates are needed anywhere, make no code changes.
          - If updates are needed, apply them in the working tree.

          Before finishing, verify any edited YAML files still parse and that you've inspect every YAML file with tool previews.
          EOF
          )

          opencode run \
            --model openai/gpt-5.4 \
            --variant medium \
            --agent build \
            --dir . \
            --dangerously-skip-permissions \
            "$PROMPT"

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain -- '*.yaml')" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: automated/tool-preview-refresh
          delete-branch: true
          commit-message: "chore: refresh MCP tool previews"
          title: "chore: refresh MCP tool previews"
          body: |
            This PR refreshes stale `toolPreview` blocks in catalog YAML files.

            Generated by the scheduled/manual OpenCode CLI workflow.
