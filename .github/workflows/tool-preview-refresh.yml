name: Tool Preview Refresh

on:
  schedule:
    # GitHub Actions cron uses UTC.
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tool-preview-refresh
  cancel-in-progress: false

jobs:
  refresh-tool-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Install mcptools
        run: |
          go install github.com/f/mcptools/cmd/mcptools@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Run OpenCode refresh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bash scripts/tool_preview_updater/update.sh

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain -- '*.yaml')" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: automated/tool-preview-refresh
          delete-branch: true
          commit-message: "chore: refresh MCP tool previews"
          title: "chore: refresh MCP tool previews"
          body: |
            This PR refreshes stale `toolPreview` blocks in catalog YAML files.

            Generated by the scheduled/manual OpenCode CLI workflow.
