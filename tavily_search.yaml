name: Tavily Search
shortDescription: Real-time web research, data extraction, and domain crawling with AI ranking
description: '![Tavily Crawl Beta](https://raw.githubusercontent.com/tavily-ai/tavily-mcp/main/assets/Banner_NEW.png)


  ![GitHub Repo stars](https://img.shields.io/github/stars/tavily-ai/tavily-mcp?style=social)

  ![npm](https://img.shields.io/npm/dt/tavily-mcp)


  ![MCP demo](https://raw.githubusercontent.com/tavily-ai/tavily-mcp/main/assets/demo_new.gif)


  A Model Context Protocol (MCP) server that provides comprehensive web research capabilities through fast, reliable APIs. It enables AI assistants to search the web in real-time, extract structured data from web pages, map website structures, and crawl entire domains with intelligent content extraction and ranking for AI applications.


  ## Features

  - **Real-time Web Search**: Optimized search with intelligent content extraction and relevancy ranking for contextual information

  - **Structured Data Extraction**: Transform web pages into LLM-ready data with automatic content cleaning and format conversion

  - **Website Mapping**: Create structured maps of website architecture to understand organization and discover pages

  - **Domain Crawling**: Systematically explore websites with smart crawling strategies that respect robots.txt and handle dynamic content

  - **Multiple Output Formats**: Support for summaries, Markdown, or cleaned text extraction

  - **Advanced Filtering**: Control search scope with domain inclusion/exclusion, time ranges, and content categories


  ## What you''ll need to connect


  **Required:**

  - **Tavily API Key**: Get your free API key at [app.tavily.com](https://app.tavily.com/home)

  '
metadata:
  categories: Retrieval & Search, SaaS & API Integrations, Developer Tools
icon: https://avatars.githubusercontent.com/u/170207473?v=4
repoURL: https://github.com/tavily-ai/tavily-mcp
runtime: remote
remoteConfig:
  fixedURL: https://mcp.tavily.com/mcp/
  headers:
  - name: Tavily API Key
    description: Tavily API Key
    key: Authorization
    required: true
    sensitive: true
    prefix: "Bearer "
toolPreview:
- name: tavily_search
  description: Search the web for current information and return ranked results with snippets and source URLs.
  params:
    query: Search query
    search_depth: Search depth (basic, advanced, fast, or ultra-fast) (optional)
    topic: Search topic category (currently general) (optional)
    time_range: Time window for results (day, week, month, or year) (optional)
    start_date: Return results published on or after this YYYY-MM-DD date (optional)
    end_date: Return results published on or before this YYYY-MM-DD date (optional)
    max_results: Maximum number of results to return (optional)
    include_images: Include related images in the response (optional)
    include_image_descriptions: Include image descriptions with returned images (optional)
    include_raw_content: Include cleaned page content for each result (optional)
    include_domains: Restrict results to these domains (optional)
    exclude_domains: Exclude these domains from results (optional)
    country: Boost results from a specific country name (optional)
    include_favicon: Include favicon URLs for results (optional)
    exact_match: Require quoted phrases in the query to match exactly (optional)
- name: tavily_extract
  description: Extract page content from one or more URLs in markdown or plain text.
  params:
    urls: URLs to extract content from
    extract_depth: Extraction depth (basic or advanced) (optional)
    include_images: Include images from the page (optional)
    format: Output format (markdown or text) (optional)
    include_favicon: Include favicon URLs (optional)
    query: Rerank extracted content chunks for a specific query (optional)
- name: tavily_crawl
  description: Crawl a website from a starting URL and extract content from matched pages.
  params:
    url: Root URL to begin crawling
    max_depth: Maximum crawl depth from the starting URL (optional)
    max_breadth: Maximum links to follow per page (optional)
    limit: Maximum number of pages to process (optional)
    instructions: Natural-language instructions for what pages to return (optional)
    select_paths: Regex path patterns to include (optional)
    select_domains: Regex domain patterns to include (optional)
    allow_external: Return external links in results (optional)
    extract_depth: Extraction depth (basic or advanced) (optional)
    format: Output format for extracted content (markdown or text) (optional)
    include_favicon: Include favicon URLs (optional)
- name: tavily_map
  description: Discover a website's structure and return URLs found from a starting page.
  params:
    url: Root URL to begin mapping
    max_depth: Maximum mapping depth from the starting URL (optional)
    max_breadth: Maximum links to follow per page (optional)
    limit: Maximum number of URLs to return (optional)
    instructions: Natural-language instructions for what links to return (optional)
    select_paths: Regex path patterns to include (optional)
    select_domains: Regex domain patterns to include (optional)
    allow_external: Return external links in results (optional)
- name: tavily_research
  description: Run multi-source research on a question or task and return a synthesized result.
  params:
    input: Research task or question to investigate
    model: Research depth model (mini, pro, or auto) (optional)
