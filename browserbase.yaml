name: Browserbase
shortDescription: Cloud browser automation with web scraping, screenshots, and AI interactions
description: 'A Model Context Protocol (MCP) server that provides cloud browser automation capabilities using Browserbase and Stagehand. Enable LLMs to interact with web pages, take screenshots, extract information, and perform automated actions with atomic precision.


  ## Features

  - **Browser Automation**: Control and orchestrate cloud browsers via Browserbase

  - **Data Extraction**: Extract structured data from any webpage

  - **Web Interaction**: Navigate, click, and fill forms with ease

  - **Screenshots**: Capture full-page and element screenshots

  - **AI-Powered Automation**: Natural language commands for web interactions

  - **Multi-Session Support**: Run multiple browser sessions in parallel

  - **Advanced Features**: Proxy support, stealth mode, and context persistence


  ## What you''ll need to connect


  **Required Credentials:**

  - **Browserbase API Key**: Your Browserbase API key

  - **Browserbase Project ID**: Your Browserbase project ID

  - **Gemini API Key**: Your Gemini API key

  '
metadata:
  categories: Automation & Browsers
icon: https://avatars.githubusercontent.com/u/158221360?v=4
repoURL: https://github.com/browserbase/mcp-server-browserbase
env:
- key: BROWSERBASE_API_KEY
  name: Browserbase API Key
  required: true
  sensitive: true
  description: Your Browserbase API key.
- key: BROWSERBASE_PROJECT_ID
  name: Browserbase Project ID
  required: true
  sensitive: false
  description: Your Browserbase project ID.
- key: GEMINI_API_KEY
  name: Gemini API Key
  required: true
  sensitive: true
  description: Your Gemini API key.
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/browserbase:2.4.3
  port: 8099
  path: /
  args:
  - mcp-server-browserbase
toolPreview:
- name: start
  description: Create or reuse the current Browserbase session.
  params: {}
- name: end
  description: Close the current Browserbase session.
  params: {}
- name: navigate
  description: Navigate the active browser session to a URL.
  params:
    url: URL to open
- name: act
  description: Perform an action on the current page using natural language.
  params:
    action: Action to perform on the page
- name: observe
  description: Identify actionable elements on the current page.
  params:
    instruction: What elements or actions to look for
- name: extract
  description: Extract structured data from the current page.
  params:
    instruction: Optional extraction instructions
