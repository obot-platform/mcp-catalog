name: Grafana
shortDescription: Query metrics, logs, traces, manage dashboards, alerts, and on-call schedules
description: |
  A Model Context Protocol (MCP) server that provides comprehensive integration with Grafana, enabling seamless interaction with observability data, dashboards, alerts, and incident management. Connect to Grafana Cloud or self-hosted Grafana instances to query metrics, logs, traces, profiles, manage dashboards and alerts, and coordinate on-call schedules.

  ## Features
  - **Observability Data Queries**: Query Prometheus metrics, Loki logs, Tempo traces, and Pyroscope profiles
  - **Dashboard Management**: Search, view, create, update dashboards with full JSONPath support for efficient modifications
  - **Alerting**: Manage alert rules, contact points, and alert groups with comprehensive monitoring capabilities
  - **Datasource Integration**: List and interact with all configured datasources (Prometheus, Loki, Tempo, Pyroscope, etc.)
  - **Incident Management**: Create, track, and manage incidents with timeline activities and drill incidents
  - **OnCall Management**: Manage on-call schedules, shifts, users, and teams for incident response coordination
  - **Sift Investigations**: Run automated investigations to find slow requests and error patterns in logs
  - **User & Organization Management**: Manage teams, users, folders, and organizational resources
  - **Deeplink Generation**: Generate direct URLs to dashboards, panels, and Explore queries

  ## What you'll need to connect

  **Required:**
  - **Grafana URL**: The URL of your Grafana instance (e.g., https://your-org.grafana.net for Grafana Cloud, or your self-hosted instance URL)

  **Authentication (choose one method):**
  - **Service Account Token** (Recommended): Generate a service account token from Administration > Service Accounts in Grafana. Make sure to grant the token the necessary permissions for the intended operations. This is the preferred authentication method for production use.
  - **Username & Password** (Alternative): Use basic authentication with your Grafana username and password. Suitable for development or local instances.

  **Optional:**
  - **Organization ID**: Specify a particular organization ID for multi-org Grafana instances.
metadata:
  categories: Observability, Monitoring, DevOps, Incident Management
icon: https://avatars.githubusercontent.com/u/7195757?s=48&v=4
repoURL: https://github.com/grafana/mcp-grafana

toolPreview:
- name: list_datasources
  description: Lists configured Grafana datasources and their UIDs.
  params:
    type: "Optional datasource type filter, such as 'prometheus' or 'loki'"
    limit: "Optional maximum number of datasources to return"
    offset: "Optional pagination offset"
- name: get_datasource
  description: Gets full datasource details by UID or name.
  params:
    uid: "Datasource UID to look up"
    name: "Datasource name to look up when UID is not provided"
- name: search_dashboards
  description: Searches dashboards by title or metadata.
  params:
    query: "Search text, such as 'kubernetes' or 'alerts'"
    limit: "Optional maximum number of matches to return"
    page: "Optional results page"
- name: search_folders
  description: Searches Grafana folders by title.
  params:
    query: "Search text for folder names"
- name: create_folder
  description: Creates a Grafana folder.
  params:
    title: "Folder title"
    uid: "Optional folder UID"
    parentUid: "Optional parent folder UID for nested folders"
- name: get_dashboard_summary
  description: Returns a compact dashboard overview with panel and variable metadata.
  params:
    uid: "Dashboard UID"
- name: get_dashboard_property
  description: Extracts specific dashboard fields with JSONPath.
  params:
    uid: "Dashboard UID"
    jsonPath: "JSONPath expression, such as '$.title' or '$.panels[*].title'"
- name: get_dashboard_by_uid
  description: Gets the full dashboard JSON for a dashboard UID.
  params:
    uid: "Dashboard UID"
- name: get_dashboard_panel_queries
  description: Returns panel queries and datasource info from a dashboard.
  params:
    uid: "Dashboard UID"
    panelId: "Optional panel ID to limit results to one panel"
    variables: "Optional dashboard variables to substitute before returning processed queries"
- name: update_dashboard
  description: Creates a dashboard or updates one with full JSON or patch operations.
  params:
    dashboard: "Full dashboard JSON for create or replace flows"
    uid: "Existing dashboard UID when applying patch operations"
    operations: "Patch operations for targeted JSONPath updates"
    folderUid: "Optional destination folder UID"
    message: "Optional version history message"
    overwrite: "Optional overwrite flag for conflicting dashboards"
- name: query_prometheus
  description: Runs instant or range PromQL against a Prometheus-compatible datasource.
  params:
    datasourceUid: "Prometheus datasource UID"
    expr: "PromQL expression, such as 'up' or 'rate(http_requests_total[5m])'"
    queryType: "'instant' or 'range'"
    startTime: "Start time in RFC3339 or relative form like 'now-1h'"
    endTime: "Optional end time for range queries"
    stepSeconds: "Optional step size for range queries"
- name: query_prometheus_histogram
  description: Calculates histogram percentiles from Prometheus histogram buckets.
  params:
    datasourceUid: "Prometheus datasource UID"
    metric: "Histogram metric base name"
    percentile: "Percentile to calculate, such as 95 or 99"
    labels: "Optional label matchers, such as 'job=\"api\"'"
    rateInterval: "Optional rate window, such as '5m'"
    startTime: "Start time in RFC3339 or relative form"
    endTime: "Optional end time for range queries"
    stepSeconds: "Optional step size for range queries"
- name: list_prometheus_metric_names
  description: Lists available metric names from a Prometheus-compatible datasource.
  params:
    datasourceUid: "Prometheus datasource UID"
    regex: "Optional regex filter for metric names"
    limit: "Optional maximum number of results"
    page: "Optional results page"
- name: list_prometheus_metric_metadata
  description: Returns metric metadata such as type, help text, and units.
  params:
    datasourceUid: "Prometheus datasource UID"
    metric: "Optional specific metric name"
    limit: "Optional maximum number of metrics to return"
    limitPerMetric: "Optional limit per metric name"
- name: list_prometheus_label_names
  description: Lists label names for matching Prometheus series.
  params:
    datasourceUid: "Prometheus datasource UID"
    matches: "Optional series selectors to scope the results"
    startRfc3339: "Optional start time filter"
    endRfc3339: "Optional end time filter"
    limit: "Optional maximum number of results"
- name: list_prometheus_label_values
  description: Lists values for a given Prometheus label name.
  params:
    datasourceUid: "Prometheus datasource UID"
    labelName: "Label name to inspect"
    matches: "Optional series selectors to scope the results"
    startRfc3339: "Optional start time filter"
    endRfc3339: "Optional end time filter"
    limit: "Optional maximum number of results"
- name: query_loki_logs
  description: Runs LogQL log or metric queries against Loki.
  params:
    datasourceUid: "Loki datasource UID"
    logql: "LogQL query, such as '{app=\"nginx\"} |= \"error\"'"
    queryType: "Optional Loki query mode when running metric-style queries"
    startRfc3339: "Optional start time, defaults to the last hour"
    endRfc3339: "Optional end time, defaults to now"
    limit: "Optional maximum number of returned entries"
    direction: "Optional result order: 'forward' or 'backward'"
    stepSeconds: "Optional step size for range metric queries"
- name: query_loki_stats
  description: Returns stream, chunk, entry, and byte counts for a Loki selector.
  params:
    datasourceUid: "Loki datasource UID"
    logql: "Label selector only, such as '{app=\"nginx\", env=\"prod\"}'"
    startRfc3339: "Optional start time, defaults to the last hour"
    endRfc3339: "Optional end time, defaults to now"
- name: query_loki_patterns
  description: Retrieves common log patterns for a Loki stream selector.
  params:
    datasourceUid: "Loki datasource UID"
    logql: "Stream selector, such as '{job=\"nginx\"}'"
    startRfc3339: "Optional start time, defaults to the last hour"
    endRfc3339: "Optional end time, defaults to now"
    step: "Optional pattern analysis step interval"
- name: list_loki_label_names
  description: Lists label keys seen in Loki logs.
  params:
    datasourceUid: "Loki datasource UID"
    startRfc3339: "Optional start time, defaults to the last hour"
    endRfc3339: "Optional end time, defaults to now"
- name: list_loki_label_values
  description: Lists values for a specific Loki label.
  params:
    datasourceUid: "Loki datasource UID"
    labelName: "Label name to inspect"
    startRfc3339: "Optional start time, defaults to the last hour"
    endRfc3339: "Optional end time, defaults to now"
- name: list_pyroscope_profile_types
  description: Lists available Pyroscope profile types.
  params:
    data_source_uid: "Pyroscope datasource UID"
    start_rfc_3339: "Optional start time, defaults to the last hour"
    end_rfc_3339: "Optional end time, defaults to now"
- name: list_pyroscope_label_names
  description: Lists profile label names in Pyroscope.
  params:
    data_source_uid: "Pyroscope datasource UID"
    matchers: "Optional Prometheus-style matchers, such as '{service_name=\"api\"}'"
    start_rfc_3339: "Optional start time, defaults to the last hour"
    end_rfc_3339: "Optional end time, defaults to now"
- name: list_pyroscope_label_values
  description: Lists values for a specific Pyroscope profile label.
  params:
    data_source_uid: "Pyroscope datasource UID"
    name: "Label name to inspect"
    matchers: "Optional Prometheus-style matchers"
    start_rfc_3339: "Optional start time, defaults to the last hour"
    end_rfc_3339: "Optional end time, defaults to now"
- name: query_pyroscope
  description: Fetches Pyroscope profile data, metrics data, or both.
  params:
    data_source_uid: "Pyroscope datasource UID"
    profile_type: "Profile type from list_pyroscope_profile_types"
    query_type: "'profile', 'metrics', or 'both'"
    matchers: "Optional Prometheus-style matchers to scope the query"
    group_by: "Optional labels to group metrics results by"
    start_rfc_3339: "Optional start time, defaults to the last hour"
    end_rfc_3339: "Optional end time, defaults to now"
    step: "Optional step for metrics queries"
    max_node_depth: "Optional profile graph depth limit"
- name: alerting_manage_rules
  description: Lists, reads, creates, updates, and deletes Grafana alert rules.
  params:
    operation: "Alert rule action, such as list, get, create, update, delete, or versions"
    rule_uid: "Rule UID for get, update, delete, or versions operations"
    search_rule_name: "Optional rule name filter when listing"
    search_folder: "Optional folder filter when listing"
    states: "Optional rule state filters"
    label_selectors: "Optional label matchers when listing rules"
    title: "Rule title for create or update"
    folder_uid: "Folder UID for create or update"
    condition: "Condition ref ID for create or update"
    data: "Alert query and expression definitions"
    labels: "Optional labels for create or update"
    annotations: "Optional annotations for create or update"
- name: alerting_manage_routing
  description: Manages alerting contact points, policies, and time intervals.
  params:
    operation: "Routing action, such as get_policies, get_contact_points, get_contact_point, or get_time_interval"
    name: "Optional exact name filter for contact points"
    contact_point_title: "Contact point title for single-contact-point lookups"
    time_interval_name: "Time interval name for interval lookups"
    datasource_uid: "Optional Alertmanager-compatible datasource UID"
    limit: "Optional maximum number of contact points to return"
- name: list_incidents
  description: Lists Grafana incidents.
  params:
    status: "Optional status filter: 'active' or 'resolved'"
    drill: "Optional flag to include drill incidents"
    limit: "Optional maximum number of incidents to return"
- name: get_incident
  description: Gets full details for an incident ID.
  params:
    id: "Incident ID"
- name: create_incident
  description: Creates a Grafana incident.
  params:
    title: "Incident title"
    severity: "Severity such as 'critical', 'high', 'medium', or 'low'"
    roomPrefix: "Room prefix for the incident room"
    status: "Optional initial status"
    labels: "Optional incident labels"
    attachUrl: "Optional URL to attach to the incident"
    attachCaption: "Optional caption for the attachment"
    isDrill: "Optional flag for drill incidents"
- name: add_activity_to_incident
  description: Adds a note to an incident timeline.
  params:
    incidentId: "Incident ID"
    body: "Note body to add to the timeline"
    eventTime: "Optional event timestamp"
- name: list_oncall_users
  description: Lists Grafana OnCall users.
  params:
    userId: "Optional specific OnCall user ID"
    username: "Optional username filter"
    page: "Optional results page"
- name: list_oncall_schedules
  description: Lists Grafana OnCall schedules.
  params:
    scheduleId: "Optional specific schedule ID"
    teamId: "Optional team ID filter"
    page: "Optional results page"
- name: get_current_oncall_users
  description: Gets users currently on call for a schedule.
  params:
    scheduleId: "Schedule ID"
- name: list_oncall_teams
  description: Lists Grafana OnCall teams.
  params:
    page: "Optional results page"
- name: list_alert_groups
  description: Lists Grafana OnCall alert groups with filtering.
  params:
    id: "Optional specific alert group ID"
    integrationId: "Optional integration ID filter"
    routeId: "Optional route ID filter"
    state: "Optional state filter: 'new', 'acknowledged', 'resolved', or 'silenced'"
    startedAt: "Optional time range in '{start}_{end}' ISO 8601 format"
    labels: "Optional label filters in 'key:value' form"
    name: "Optional alert group name filter"
    teamId: "Optional team ID filter"
    page: "Optional results page"
- name: get_alert_group
  description: Gets details for a specific Grafana OnCall alert group.
  params:
    alertGroupId: "Alert group ID"
- name: get_oncall_shift
  description: Gets details for a specific Grafana OnCall shift.
  params:
    shiftId: "Shift ID"
- name: list_sift_investigations
  description: Lists recent Sift investigations.
  params:
    limit: "Optional maximum number of investigations to return"
- name: get_sift_investigation
  description: Gets details for a Sift investigation UUID.
  params:
    id: "Investigation UUID"
- name: get_sift_analysis
  description: Gets a specific analysis from a Sift investigation.
  params:
    investigationId: "Investigation UUID"
    analysisId: "Analysis UUID"
- name: find_slow_requests
  description: Runs a Sift investigation to find slow requests.
  params:
    name: "Investigation name"
    labels: "Labels that scope the analysis"
    start: "Optional ISO 8601 start time"
    end: "Optional ISO 8601 end time"
- name: find_error_pattern_logs
  description: Runs a Sift investigation to detect elevated error patterns in logs.
  params:
    name: "Investigation name"
    labels: "Labels that scope the analysis"
    start: "Optional ISO 8601 start time"
    end: "Optional ISO 8601 end time"
- name: generate_deeplink
  description: Generates Grafana dashboard, panel, or Explore URLs.
  params:
    resourceType: "'dashboard', 'panel', or 'explore'"
    dashboardUid: "Dashboard UID for dashboard and panel links"
    panelId: "Panel ID for panel links"
    datasourceUid: "Datasource UID for Explore links"
    queries: "Optional Explore queries to embed in the link"
    timeRange: "Optional time range object with 'from' and 'to'"
    queryParams: "Optional extra query parameters"
- name: get_assertions
  description: Gets assertion summaries for an entity and time range.
  params:
    entityType: "Entity type, such as 'Service', 'Node', or 'Pod'"
    entityName: "Entity name"
    env: "Optional environment"
    site: "Optional site"
    namespace: "Optional namespace"
    startTime: "Start time in RFC3339 format"
    endTime: "End time in RFC3339 format"
- name: get_annotations
  description: Fetches Grafana annotations using dashboard, alert, tag, and time filters.
  params:
    DashboardUID: "Optional dashboard UID filter"
    From: "Optional start time"
    To: "Optional end time"
    Tags: "Optional tag filters"
    MatchAny: "Optional flag to match any tag instead of all tags"
    Limit: "Optional maximum number of annotations to return"
    PanelID: "Optional panel ID filter"
    AlertUID: "Optional alert UID filter"
- name: get_annotation_tags
  description: Lists available annotation tags.
  params:
    tag: "Optional exact or partial tag filter"
    limit: "Optional maximum number of tags to return"
- name: create_annotation
  description: Creates a standard or Graphite-format annotation.
  params:
    text: "Annotation text"
    time: "Annotation start time"
    timeEnd: "Optional annotation end time"
    dashboardUID: "Optional dashboard UID to attach to"
    dashboardId: "Optional dashboard ID to attach to"
    panelId: "Optional panel ID to attach to"
    tags: "Optional annotation tags"
    format: "Optional format, including 'graphite'"
    what: "Graphite annotation title when using graphite format"
    when: "Graphite annotation timestamp when using graphite format"
    data: "Optional extra annotation data"
    graphiteData: "Optional Graphite payload"
- name: update_annotation
  description: Updates selected fields on an existing annotation.
  params:
    id: "Annotation ID"
    text: "Optional replacement text"
    time: "Optional replacement start time"
    timeEnd: "Optional replacement end time"
    tags: "Optional replacement tags"
    data: "Optional replacement annotation data"
- name: get_panel_image
  description: Renders a dashboard panel or full dashboard as a PNG image.
  params:
    dashboardUid: "Dashboard UID"
    panelId: "Optional panel ID for single-panel renders"
    timeRange: "Optional time range object"
    variables: "Optional dashboard variables for the render request"
    width: "Optional image width"
    height: "Optional image height"
    theme: "Optional render theme"
    scale: "Optional render scale factor"
    timeout: "Optional render timeout"

env:
- name: Grafana URL
  key: GRAFANA_URL
  description: The URL of your Grafana instance (e.g., https://your-org.grafana.net for Grafana Cloud, or your self-hosted instance URL)
  required: true
  sensitive: false
- name: Grafana Service Account Token
  key: GRAFANA_SERVICE_ACCOUNT_TOKEN
  description: (Recommended) Your Grafana service account token for API authentication. Generate from Administration > Service Accounts in Grafana. Requires appropriate permissions for intended operations.
  required: false
  sensitive: true
- key: GRAFANA_USERNAME
  name: Grafana Username
  required: false
  sensitive: false
  description: (Optional) Your Grafana username for basic authentication.
- key: GRAFANA_PASSWORD
  name: Grafana Password
  required: false
  sensitive: true
  description: (Optional) Your Grafana password for basic authentication.
- key: GRAFANA_ORG_ID
  name: Grafana Organization ID
  required: false
  sensitive: false
  description: (Optional) Your Grafana organization ID for multi-org support.


runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/grafana:latest
  port: 8080
  path: "/mcp"
  args:
  - -t
  - streamable-http
  - --address
  - 0.0.0.0:8080

