name: Firecrawl
shortDescription: Web scraping, crawling, search, and structured data extraction with Firecrawl
description: 'A Model Context Protocol (MCP) server that integrates with Firecrawl for web scraping capabilities. Perform web scraping, crawling, search, and content extraction with automatic retries and rate limiting.


  ## Features

  - **Web Scraping**: Extract content from single pages or batch process multiple URLs

  - **Site Discovery**: Map websites to discover all indexed URLs and site structure

  - **Web Search**: Search the web and optionally extract content from search results

  - **Content Crawling**: Comprehensive site crawling with depth control and filtering

  - **Structured Extraction**: Extract specific data using LLM capabilities with JSON schemas

  - **Deep Research**: In-depth, multi-source research with intelligent analysis

  - **Rate Limiting**: Automatic rate limit handling with exponential backoff and retries


  ## What you''ll need to connect


  **Required:**

  - **Firecrawl API Key**: Your Firecrawl API key (visit https://www.firecrawl.dev to get a new key)


  ## Example Usage


  - **Single URL**: Use `scrape`

  - **Multiple URLs**: Use `batch_scrape`

  - **Discover URLs**: Use `map`

  - **Web Search**: Use `search`

  - **Structured Data**: Use `extract`

  - **Whole Site Analysis**: Use `crawl` (with limits!)

  - **In-depth Research**: Use `deep_research`


  ### Quick Reference Table


  | Tool                | Best for                                 | Returns         |

  | ------------------- | ---------------------------------------- | --------------- |

  | scrape              | Single page content                      | markdown/html   |

  | batch_scrape        | Multiple known URLs                      | markdown/html[] |

  | map                 | Discovering URLs on a site               | URL[]           |

  | crawl               | Multi-page extraction (with limits)      | markdown/html[] |

  | search              | Web search for info                      | results[]       |

  | extract             | Structured data from pages               | JSON            |

  | deep_research       | In-depth, multi-source research          | summary, sources|

  | generate_llmstxt    | LLMs.txt for a domain                    | text            |

  '
metadata:
  categories: Retrieval & Search,Automation & Browsers,Science & Research
  source: vendor
icon: https://avatars.githubusercontent.com/u/135057108?v=4
repoURL: https://github.com/firecrawl/firecrawl-mcp-server
toolPreview:
- name: firecrawl_scrape
  description: Scrape a single page into markdown, HTML, JSON, screenshots, or brand data.
  params:
    url: The URL to scrape
    formats: Output formats such as markdown, html, json, screenshot, or branding
    jsonOptions: Prompt and schema for structured JSON extraction
    actions: Optional browser actions to run before returning content
    onlyMainContent: Strip navigation and other boilerplate content
    includeTags: HTML tags to keep in the result
    excludeTags: HTML tags to exclude from the result
    waitFor: Milliseconds to wait for client-side rendering
    parsers: Optional parsers such as pdf
    maxAge: Reuse recent cached content when available
    proxy: Proxy mode for difficult targets
- name: firecrawl_map
  description: Discover URLs on a site before scraping or crawling.
  params:
    url: Starting URL for URL discovery
    search: Filter discovered URLs by a search term
    sitemap: Whether to include, skip, or only use sitemap discovery
    includeSubdomains: Include subdomain URLs in results
    ignoreQueryParameters: Ignore query strings when deduplicating URLs
    limit: Maximum number of URLs to return
- name: firecrawl_crawl
  description: Start a crawl job and extract content from matching pages.
  params:
    allowExternalLinks: Allow crawling links to external domains
    allowSubdomains: Allow crawling subdomains of the target site
    crawlEntireDomain: Expand crawling across the full domain
    delay: Delay between crawl requests
    deduplicateSimilarURLs: Remove similar URLs during crawl
    excludePaths: URL paths to exclude from crawling
    includePaths: Only crawl these URL paths
    limit: Maximum number of pages to crawl
    maxConcurrency: Maximum concurrent crawl workers
    maxDiscoveryDepth: Maximum discovery depth for links
    prompt: Extraction instructions for the crawl
    scrapeOptions: Options for scraping each page
    sitemap: Whether to include, skip, or only use sitemap discovery
    url: Starting URL for the crawl
    webhook: Optional webhook URL for crawl completion events
    ignoreQueryParameters: Ignore query strings when comparing URLs
- name: firecrawl_check_crawl_status
  description: Check the status of a crawl job.
  params:
    id: Crawl job ID to check
- name: firecrawl_search
  description: Search the web and optionally scrape matching result pages.
  params:
    query: Search query string
    limit: Maximum number of results to return
    tbs: Time-based search filter
    filter: Search filter expression
    location: Location hint for search ranking
    sources: Search sources such as web, images, or news
    scrapeOptions: Options for scraping search results
    enterprise: Enterprise search modes such as default, anon, or zdr
- name: firecrawl_extract
  description: Extract structured data from one or more pages.
  params:
    allowExternalLinks: Allow extraction from external links
    enableWebSearch: Enable web search for additional context
    includeSubdomains: Include subdomains in extraction
    prompt: Prompt for the LLM extraction
    schema: JSON schema for structured data extraction
    urls: List of URLs to extract information from
- name: firecrawl_agent
  description: Start an asynchronous research agent for multi-step web investigation.
  params:
    prompt: Research task for the autonomous agent
    urls: Optional URLs to focus the agent on specific pages
    schema: Optional schema for structured results
- name: firecrawl_agent_status
  description: Check the status of an agent job and return results when complete.
  params:
    id: Agent job ID to check
env:
- key: FIRECRAWL_API_KEY
  name: Firecrawl API Key
  required: true
  sensitive: true
  description: Your Firecrawl API key.
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/firecrawl:3.11.0
  port: 8099
  path: /
  args:
  - firecrawl-mcp
