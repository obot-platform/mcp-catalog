name: AWS Knowledge
shortDescription: Check AWS service regional availability and search AWS documentation
description: 'A Model Context Protocol (MCP) server that provides comprehensive AWS knowledge access including documentation search, regional availability checking, and content recommendations. Built and hosted by AWS Labs.


  ## Features

  - **Regional Availability**: Check AWS service and resource availability across regions for both API operations and CloudFormation resources

  - **Region Information**: List all AWS regions with their identifiers and friendly names

  - **Documentation Search**: Search across all AWS documentation using the official AWS Documentation Search API

  - **Documentation Reader**: Fetch and convert AWS documentation pages to markdown format with pagination support

  - **Content Recommendations**: Get related documentation recommendations including highly rated, new, similar, and commonly viewed next pages


  ## What you''ll need to connect


  **No Setup Required**: AWS Knowledge MCP server is hosted by AWS and works out-of-the-box with no API keys or configuration needed.


  ## Basic Usage


  Examples:

  - "Is AWS Lambda available in eu-west-1?"

  - "Check if AWS::EC2::Instance CloudFormation resource is available in ap-southeast-2"

  - "List all AWS regions"

  - "Search for S3 bucket versioning documentation"

  - "Read documentation from https://docs.aws.amazon.com/lambda/latest/dg/lambda-invocation.html"

  - "Recommend related content for the Lambda invocation documentation page"

  '
metadata:
  categories: Documentation & Learning, Developer Tools
icon: https://avatars.githubusercontent.com/u/3299148?s=48&v=4
repoURL: https://github.com/awslabs/mcp/tree/main/src/aws-knowledge-mcp-server
runtime: remote
remoteConfig:
  fixedURL: https://knowledge-mcp.global.api.aws
toolPreview:
- name: aws___get_regional_availability
  description: Check AWS resource availability across regions for products, API operations, and CloudFormation resource types.
  params:
    regions: One or more AWS region codes to check (up to 10 per call)
    resource_type: Resource kind to query - 'product', 'api', or 'cfn'
    filters: Optional resource filters. Use product names, 'SdkServiceId+APIOperation' or service IDs for APIs, and CloudFormation type names for 'cfn'
    next_token: Pagination token for continuing an unfiltered single-region query
- name: aws___list_regions
  description: List all AWS regions with their region codes and human-friendly names.
  params: {}
- name: aws___read_documentation
  description: Fetch AWS documentation pages and convert them to markdown, with batched requests and pagination support for long pages.
  params:
    requests: List of documentation requests containing `url` plus optional `max_length` and `start_index`
- name: aws___recommend
  description: Get related AWS documentation recommendations, including highly rated, new, similar, and commonly viewed next pages.
  params:
    url: AWS documentation URL to get recommendations for
- name: aws___retrieve_agent_sop
  description: Retrieve the full AWS agent SOP workflow for an exact SOP name returned by `aws___search_documentation`.
  params:
    sop_name: Exact SOP identifier returned in search results
- name: aws___search_documentation
  description: Search official AWS documentation and AWS agent SOP content, with optional topic filters for docs, troubleshooting, Amplify, CDK, CloudFormation, and current-awareness content.
  params:
    search_phrase: AWS search query to run
    topics: Optional list of up to 3 topic filters such as `reference_documentation`, `troubleshooting`, `agent_sops`, or `general`
    limit: Maximum number of results to return
